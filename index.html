<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DestiMatrix Calculator</title>
  <style>
    :root{--ink:#222831;--muted:#6b7280;--paper:#fffaf6;--card:#ffffff;--gold:#f2a873;--gold2:#f8d6bd;--line:#222831;--pink:#e95d9d;--red:#ef4444;--blue:#1d4ed8;--green:#22c55e;--soft:#f4efe9;--shadow:0 22px 60px rgba(34,40,49,.12)}
    *{box-sizing:border-box} body{margin:0;font-family:Roboto,Arial,sans-serif;background:radial-gradient(circle at top,#fff6ef 0,#fffaf6 36%,#f7efe7 100%);color:var(--ink)}
    .page{width:min(1220px,100%);margin:auto;padding:28px 16px 60px}.brand{text-align:center;margin-bottom:22px}.brand h1{font-family:Georgia,serif;font-size:clamp(34px,6vw,72px);line-height:1;margin:0;color:#20242b}.brand p{margin:10px 0 0;color:var(--muted);font-weight:600;letter-spacing:.08em;text-transform:uppercase;font-size:12px}.panel{background:rgba(255,255,255,.84);border:1px solid #eadfd5;border-radius:28px;box-shadow:var(--shadow);padding:20px}.form{display:grid;grid-template-columns:1fr 1fr auto;gap:14px;align-items:end;margin-bottom:22px}label{display:block;font-size:12px;font-weight:800;text-transform:uppercase;letter-spacing:.08em;margin-bottom:7px;color:#4b5563}input{width:100%;border:1px solid #dfd2c8;border-radius:16px;padding:14px 16px;background:#fff;color:var(--ink);font-size:16px;outline:none}input:focus{border-color:var(--gold);box-shadow:0 0 0 4px rgba(242,168,115,.16)}button{border:0;border-radius:16px;background:var(--ink);color:white;padding:15px 24px;font-weight:800;font-size:15px;cursor:pointer;min-height:50px}.layout{display:grid;grid-template-columns:minmax(320px,1fr) minmax(420px,1.25fr);gap:22px;align-items:start}.card{background:white;border:1px solid #eadfd5;border-radius:24px;padding:18px;overflow:hidden}.section-title{font-family:Georgia,serif;font-size:26px;margin:0 0 14px}.diagram-wrap{display:flex;justify-content:center;overflow:auto;padding:4px}.matrix-svg{width:min(100%,760px);height:auto;display:block}.matrix-line{fill:none;stroke:var(--line);stroke-width:2.2;stroke-linecap:round;stroke-linejoin:round}.personal-line{stroke:var(--pink);stroke-width:2.6}.generation-line{stroke:var(--red);stroke-width:2.6}.earth-line{stroke:var(--green);stroke-width:2.4}.sky-line{stroke:var(--blue);stroke-width:2.4}.node circle{stroke:#222831;stroke-width:2;filter:drop-shadow(0 4px 6px rgba(0,0,0,.12))}.node text{font-family:Georgia,serif;font-weight:800;text-anchor:middle;dominant-baseline:central;fill:#111827}.node .caption{font-family:Roboto,Arial,sans-serif;font-size:9px;font-weight:800;letter-spacing:.04em;fill:#6b7280}.lg text.value{font-size:24px}.md text.value{font-size:18px}.sm text.value{font-size:13px}.age{font-size:8.5px;font-weight:700;text-anchor:middle;dominant-baseline:central;fill:#5b6370}.year-arcana{font-family:Georgia,serif;font-size:10px;font-weight:800;text-anchor:middle;dominant-baseline:central;fill:#111827}.year-dot{fill:#fff;stroke:#dfcfc3;stroke-width:1}.health-table{width:100%;border-collapse:separate;border-spacing:0;overflow:hidden;border-radius:18px;border:1px solid #eadfd5;font-size:13px}th,td{padding:10px 9px;border-bottom:1px solid #eadfd5;text-align:center}th{background:#fff6ef;font-weight:800}.health-table tr:last-child td,.health-table tr:last-child th{border-bottom:0}.chakra{text-align:left}.chakra b{display:block}.chakra span{font-size:11px;color:#6b7280}.crown{color:#8b5cf6}.ajna{color:#3b82f6}.throat{color:#38bdf8}.heart{color:#22c55e}.solar{color:#eab308}.sacral{color:#f97316}.root{color:#ef4444}.chips{display:grid;grid-template-columns:repeat(2,1fr);gap:10px}.chip{background:#fffaf6;border:1px solid #eadfd5;border-radius:16px;padding:12px}.chip small{display:block;color:#6b7280;font-weight:800;text-transform:uppercase;font-size:10px;letter-spacing:.06em}.chip b{font-family:Georgia,serif;font-size:24px}.note{color:#6b7280;font-size:13px;line-height:1.6;margin-top:12px}.error{display:none;color:#b91c1c;background:#fee2e2;border:1px solid #fecaca;border-radius:14px;padding:10px;margin-bottom:12px;font-weight:700}
    @media(max-width:900px){.form,.layout{grid-template-columns:1fr}.panel{padding:14px}.card{padding:12px}.matrix-svg{min-width:600px}.diagram-wrap{justify-content:flex-start}.brand h1{font-size:44px}}
  </style>
</head>
<body>
<main class="page">
  <header class="brand"><h1>DestiMatrix</h1><p>Destiny Matrix Calculator</p></header>
  <section class="panel">
    <form class="form" id="birthForm">
      <div><label for="name">Name</label><input id="name" placeholder="Your name" value="" /></div>
      <div><label for="dob">Date of birth</label><input id="dob" placeholder="DD.MM.YYYY" value="23.12.1992" /></div>
      <button type="submit">Calculate</button>
    </form>
    <div id="error" class="error"></div>
    <div class="layout">
      <aside class="card">
        <h2 class="section-title">Health card</h2>
        <table class="health-table"><thead><tr><th></th><th>Chakra name</th><th>Physics</th><th>Energy</th><th>Emotions</th></tr></thead><tbody id="healthBody"></tbody></table>
        <p class="note">All calculations happen directly in the browser. No database, no account, no saved personal data.</p>
      </aside>
      <section class="card"><h2 class="section-title" id="title">Personal calculation</h2><div class="diagram-wrap"><svg id="matrix" class="matrix-svg" viewBox="0 0 720 720" role="img" aria-label="Destiny Matrix diagram"></svg></div></section>
    </div>
    <section class="card" style="margin-top:22px"><h2 class="section-title">Core codes</h2><div class="chips" id="chips"></div></section>
  </section>
</main>
<script>
(() => {
  const svg = document.getElementById('matrix');
  const healthBody = document.getElementById('healthBody');
  const chips = document.getElementById('chips');
  const title = document.getElementById('title');
  const error = document.getElementById('error');
  const NS = 'http://www.w3.org/2000/svg';
  const C = {x:360,y:360};
  const P = {
    a:{x:360,y:92}, b:{x:548,y:172}, c:{x:628,y:360}, d:{x:548,y:548},
    e:{x:360,y:628}, f:{x:172,y:548}, g:{x:92,y:360}, h:{x:172,y:172},
    center:{x:360,y:360},
    portrait2:{x:218,y:360}, portrait3:{x:260,y:360}, talent2:{x:360,y:218}, talent3:{x:360,y:260},
    material2:{x:502,y:360}, material3:{x:460,y:360}, karma2:{x:360,y:502}, karma3:{x:360,y:460},
    male1:{x:226,y:226}, male2:{x:494,y:494}, female1:{x:494,y:226}, female2:{x:226,y:494}
  };
  function el(name, attrs={}, parent=svg){const n=document.createElementNS(NS,name);Object.entries(attrs).forEach(([k,v])=>n.setAttribute(k,v));parent.appendChild(n);return n;}
  function reduce22(n){n=Math.abs(Number(n));while(n>22){n=String(n).split('').reduce((a,d)=>a+Number(d),0)}return n===0?22:n}
  function parseDate(v){const m=String(v).trim().match(/^(\d{1,2})[.\/\-](\d{1,2})[.\/\-](\d{4})$/);if(!m)throw new Error('Please enter the date in DD.MM.YYYY format.');const d=+m[1],mo=+m[2],y=+m[3];const dt=new Date(y,mo-1,d);if(dt.getFullYear()!==y||dt.getMonth()!==mo-1||dt.getDate()!==d)throw new Error('This date does not exist.');return{d,mo,y}}
  function calc(date){const day=reduce22(date.d), month=reduce22(date.mo), year=reduce22(String(date.y).split('').reduce((a,d)=>a+Number(d),0));const tail=reduce22(day+month+year);const center=reduce22(day+month+year+tail);
    const portrait2=reduce22(day+center), portrait3=reduce22(day+portrait2); const talent2=reduce22(month+center), talent3=reduce22(month+talent2); const material2=reduce22(year+center), material3=reduce22(year+material2); const karma2=reduce22(tail+center), karma3=reduce22(tail+karma2);
    const male1=reduce22(day+month), female1=reduce22(month+year), male2=reduce22(year+tail), female2=reduce22(tail+day); const genPower=reduce22(male1+female1+male2+female2); const genResult=reduce22(center+genPower);
    return{day,month,year,tail,center,portrait2,portrait3,talent2,talent3,material2,material3,karma2,karma3,male1,female1,male2,female2,genPower,genResult};}
  function yearlyBetween(a,b,depth=4){if(depth===0)return[];const m=reduce22(a+b);return[...yearlyBetween(a,m,depth-1),m,...yearlyBetween(m,b,depth-1)]}
  function outerYears(v){const anchors=[v.day,v.month,v.year,v.tail,v.day];const arr=[];for(let i=0;i<4;i++){arr.push(anchors[i],...yearlyBetween(anchors[i],anchors[i+1],4))}return arr.slice(0,64)}
  function path(points,cls){el('polyline',{points:points.map(p=>`${p.x},${p.y}`).join(' '),class:'matrix-line '+cls})}
  function node(p,val,size='md',fill='#fff',caption=''){const r=size==='lg'?29:size==='sm'?15:21;const g=el('g',{class:`node ${size}`});el('circle',{cx:p.x,cy:p.y,r,fill},g);el('text',{x:p.x,y:p.y,class:'value'},g).textContent=val;if(caption){el('text',{x:p.x,y:p.y+r+13,class:'caption'},g).textContent=caption}}
  function draw(v){svg.innerHTML=''; path([P.a,P.b,P.c,P.d,P.e,P.f,P.g,P.h,P.a],''); path([P.a,P.c,P.e,P.g,P.a],'personal-line'); path([P.h,P.b,P.d,P.f,P.h],'generation-line'); path([P.g,P.c],'earth-line'); path([P.a,P.e],'sky-line'); path([P.h,P.d],'generation-line'); path([P.b,P.f],'generation-line');
    const vals=outerYears(v); for(let i=0;i<64;i++){const ang=(-90+i*360/64)*Math.PI/180;const ageR=302, yR=330; const ax=C.x+Math.cos(ang)*ageR, ay=C.y+Math.sin(ang)*ageR; const yx=C.x+Math.cos(ang)*yR, yy=C.y+Math.sin(ang)*yR; el('circle',{cx:yx,cy:yy,r:10,class:'year-dot'}); el('text',{x:ax,y:ay,class:'age'}).textContent=i; el('text',{x:yx,y:yy,class:'year-arcana'}).textContent=vals[i]; }
    node(P.a,v.month,'lg','#c7d2fe','MONTH'); node(P.c,v.year,'lg','#bbf7d0','YEAR'); node(P.e,v.tail,'lg','#fecaca','KARMIC TAIL'); node(P.g,v.day,'lg','#fbcfe8','DAY'); node(P.center,v.center,'lg','#fde68a','CENTER');
    node(P.portrait2,v.portrait2,'md','#dbeafe'); node(P.portrait3,v.portrait3,'sm','#e0f2fe'); node(P.talent2,v.talent2,'md','#dbeafe'); node(P.talent3,v.talent3,'sm','#e0f2fe'); node(P.material2,v.material2,'md','#dbeafe'); node(P.material3,v.material3,'sm','#e0f2fe'); node(P.karma2,v.karma2,'md','#dbeafe'); node(P.karma3,v.karma3,'sm','#e0f2fe');
    node(P.male1,v.male1,'md','#fee2e2'); node(P.female1,v.female1,'md','#fee2e2'); node(P.male2,v.male2,'md','#fee2e2'); node(P.female2,v.female2,'md','#fee2e2'); node({x:428,y:428},v.genPower,'sm','#fff7ed'); node({x:458,y:458},v.genResult,'sm','#fff7ed'); }
  function health(v){const rows=[['1','Sahasrara','Mission','crown',v.month,v.year],['2','Ajna','Destiny, egregores','ajna',v.talent2,v.material2],['3','Vissudha','Self-expression','throat',v.portrait2,v.material3],['4','Anahata','Relationships','heart',v.portrait3,v.karma3],['5','Manipura','Status, possessions','solar',v.center,v.center],['6','Svadhisthana','Joy, children','sacral',v.male2,v.female2],['7','Muladhara','Body, material world','root',v.tail,v.day]]; healthBody.innerHTML=''; let sp=0,se=0,sm=0; rows.forEach(r=>{const emo=reduce22(r[4]+r[5]);sp+=r[4];se+=r[5];sm+=emo;healthBody.insertAdjacentHTML('beforeend',`<tr><th class="${r[3]}">${r[0]}</th><td class="chakra"><b>${r[1]}</b><span>${r[2]}</span></td><td>${r[4]}</td><td>${r[5]}</td><td>${emo}</td></tr>`)}); healthBody.insertAdjacentHTML('beforeend',`<tr><th></th><td class="chakra"><b>Result</b><span>Common energy-zone</span></td><td>${reduce22(sp)}</td><td>${reduce22(se)}</td><td>${reduce22(sm)}</td></tr>`)}
  function render(){try{error.style.display='none';const name=document.getElementById('name').value.trim();const date=parseDate(document.getElementById('dob').value);const v=calc(date);title.textContent=name?`${name}'s personal calculation`:'Personal calculation';draw(v);health(v); chips.innerHTML=[['Day',v.day],['Month',v.month],['Year',v.year],['Karmic tail',v.tail],['Central arcana',v.center],['Generation power',v.genPower],['Generation result',v.genResult],['Age ring','0-63']].map(([a,b])=>`<div class="chip"><small>${a}</small><b>${b}</b></div>`).join('')}catch(e){error.textContent=e.message;error.style.display='block'}}
  document.getElementById('birthForm').addEventListener('submit',e=>{e.preventDefault();render()}); render();
})();
</script>
</body>
</html>
