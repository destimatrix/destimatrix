<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Матрица Судьбы</title>
    <style>
        :root {
            --bg-color: #f8f9fa;
            --card-bg: #ffffff;
            --text-color: #212529;
            --border-color: #dee2e6;
            --font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            
            /* Оригинальные цвета вершин */
            --node-yellow: #ffca28;
            --node-purple: #9c27b0;
            --node-blue: #2196f3;
            --node-red: #ef5350;
            --node-cyan: #00bcd4;
            --node-orange: #ff9800;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: var(--font-family);
            background-color: var(--bg-color);
            color: var(--text-color);
            padding: 20px;
            display: flex;
            justify-content: center;
        }

        .container {
            width: 100%;
            max-width: 1200px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
        }

        .calculator-card {
            background: var(--card-bg);
            padding: 20px;
            border-radius: 16px;
            border: 1px solid var(--border-color);
            width: 100%;
            max-width: 400px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.04);
            text-align: center;
        }

        .input-group {
            display: flex;
            flex-direction: column;
            gap: 6px;
            text-align: left;
            margin-bottom: 14px;
        }

        .input-group label {
            font-weight: 600;
            font-size: 0.85rem;
            color: #6c757d;
        }

        .input-group input {
            padding: 12px;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            font-size: 1rem;
            outline: none;
            background-color: #fdfdfd;
        }

        .btn-calc {
            background-color: #212529;
            color: white;
            border: none;
            padding: 12px;
            font-size: 1rem;
            font-weight: 600;
            border-radius: 8px;
            cursor: pointer;
            width: 100%;
        }

        .btn-calc:hover {
            background-color: #000000;
        }

        .workspace {
            display: grid;
            grid-template-columns: 1fr;
            gap: 24px;
            width: 100%;
        }

        @media (min-width: 992px) {
            .workspace {
                grid-template-columns: 1.2fr 0.8fr;
                align-items: start;
            }
        }

        .diagram-container {
            background: var(--card-bg);
            padding: 10px;
            border-radius: 20px;
            border: 1px solid var(--border-color);
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: 0 2px 12px rgba(0,0,0,0.04);
        }

        svg {
            width: 100%;
            max-width: 650px;
            height: auto;
            overflow: visible;
        }

        .health-card {
            background: var(--card-bg);
            padding: 20px;
            border-radius: 20px;
            border: 1px solid var(--border-color);
            box-shadow: 0 2px 12px rgba(0,0,0,0.04);
        }

        .health-card h2 {
            font-size: 1.2rem;
            font-weight: 700;
            margin-bottom: 14px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.85rem;
        }

        th, td {
            padding: 10px 6px;
            border-bottom: 1px solid var(--border-color);
            text-align: left;
        }

        th {
            color: #6c757d;
            font-weight: 600;
            font-size: 0.75rem;
            text-transform: uppercase;
        }

        .chakra-mark {
            display: flex;
            align-items: center;
            gap: 8px;
            font-weight: 600;
        }

        .chakra-badge {
            width: 8px;
            height: 8px;
            border-radius: 50%;
        }

        tr.total-summary {
            font-weight: 700;
            background-color: #f8f9fa;
        }

        /* Стили текста в SVG */
        text {
            font-weight: 700;
            user-select: none;
        }
        .lbl-age {
            font-size: 11px;
            fill: #868e96;
            font-weight: 500;
        }
        .lbl-node {
            font-size: 13px;
            fill: #ffffff;
        }
        .lbl-node-dark {
            font-size: 13px;
            fill: #212529;
        }
        .lbl-channel {
            font-size: 11px;
            font-weight: bold;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="calculator-card">
        <div class="input-group">
            <label for="birthdate">Дата рождения</label>
            <input type="date" id="birthdate" value="1994-05-28">
        </div>
        <button class="btn-calc" onclick="calculateMatrix()">Рассчитать</button>
    </div>

    <div class="workspace">
        <div class="diagram-container">
            <svg id="matrixSvg" viewBox="0 0 800 800">
                <g id="gridLines">
                    <circle cx="400" cy="400" r="260" stroke="#adb5bd" stroke-width="1.2" fill="none" />
                    <circle cx="400" cy="400" r="160" stroke="#dee2e6" stroke-width="1" stroke-dasharray="4,4" fill="none" />

                    <path d="M 400 140 L 660 400 L 400 660 L 140 400 Z" stroke="#495057" stroke-width="1.5" fill="none" />
                    <path d="M 216.16 216.16 L 583.84 216.16 L 583.84 556.84 L 216.16 556.84 Z" transform="rotate(45 400 400)" stroke="#868e96" stroke-width="1.2" fill="none" />

                    <line x1="140" y1="400" x2="660" y2="400" stroke="#495057" stroke-width="1" />
                    <line x1="400" y1="140" x2="400" y2="660" stroke="#495057" stroke-width="1" />

                    <line x1="216.16" y1="216.16" x2="583.84" y2="583.84" stroke="#adb5bd" stroke-width="1" stroke-dasharray="3,3" />
                    <line x1="583.84" y1="216.16" x2="216.16" y2="583.84" stroke="#adb5bd" stroke-width="1" stroke-dasharray="3,3" />
                </g>

                <g id="ageLabels">
                    <text x="105" y="404" class="lbl-age" text-anchor="end">0 лет</text>
                    <text x="200" y="200" class="lbl-age" text-anchor="end">10 лет</text>
                    <text x="400" y="115" class="lbl-age" text-anchor="middle">20 лет</text>
                    <text x="600" y="200" class="lbl-age" text-anchor="start">30 лет</text>
                    <text x="695" y="404" class="lbl-age" text-anchor="start">40 лет</text>
                    <text x="600" y="605" class="lbl-age" text-anchor="start">50 лет</text>
                    <text x="400" y="695" class="lbl-age" text-anchor="middle">60 лет</text>
                    <text x="200" y="605" class="lbl-age" text-anchor="end">70 лет</text>
                </g>

                <g id="nodesGroup">
                    <circle cx="400" cy="400" r="24" fill="var(--node-yellow)" stroke="#212529" stroke-width="1.5" />
                    <text x="400" y="405" id="n_E" font-size="16" fill="#212529" text-anchor="middle"></text>

                    <circle cx="140" cy="400" r="18" fill="var(--node-yellow)" stroke="#212529" stroke-width="1.5" />
                    <text x="140" y="404" id="n_A" class="lbl-node-dark" text-anchor="middle"></text>

                    <circle cx="400" cy="140" r="18" fill="var(--node-purple)" stroke="#212529" stroke-width="1.5" />
                    <text x="400" y="144" id="n_B" class="lbl-node" text-anchor="middle"></text>

                    <circle cx="660" cy="400" r="18" fill="var(--node-blue)" stroke="#212529" stroke-width="1.5" />
                    <text x="660" y="404" id="n_C" class="lbl-node" text-anchor="middle"></text>

                    <circle cx="400" cy="660" r="18" fill="var(--node-red)" stroke="#212529" stroke-width="1.5" />
                    <text x="400" y="664" id="n_D" class="lbl-node" text-anchor="middle"></text>

                    <circle cx="216.16" cy="216.16" r="15" fill="#ffffff" stroke="#868e96" stroke-width="1.5" />
                    <text x="216.16" y="220" id="n_anc10" font-size="12" fill="#212529" text-anchor="middle"></text>
                    <circle cx="583.84" cy="216.16" r="15" fill="#ffffff" stroke="#868e96" stroke-width="1.5" />
                    <text x="583.84" y="220" id="n_anc30" font-size="12" fill="#212529" text-anchor="middle"></text>
                    <circle cx="583.84" cy="556.84" r="15" fill="#ffffff" stroke="#868e96" stroke-width="1.5" />
                    <text x="583.84" y="560" id="n_anc50" font-size="12" fill="#212529" text-anchor="middle"></text>
                    <circle cx="216.16" cy="556.84" r="15" fill="#ffffff" stroke="#868e96" stroke-width="1.5" />
                    <text x="216.16" y="560" id="n_anc70" font-size="12" fill="#212529" text-anchor="middle"></text>

                    <circle cx="400" cy="205" r="12" fill="#ffffff" stroke="var(--node-blue)" stroke-width="1.5" />
                    <text x="400" y="209" id="n_ch_ajna" font-size="11" fill="#212529" text-anchor="middle"></text>
                    <circle cx="400" cy="270" r="12" fill="#ffffff" stroke="var(--node-cyan)" stroke-width="1.5" />
                    <text x="400" y="274" id="n_ch_vissudha" font-size="11" fill="#212529" text-anchor="middle"></text>
                    <circle cx="400" cy="335" r="12" fill="#ffffff" stroke="#4caf50" stroke-width="1.5" />
                    <text x="400" y="339" id="n_ch_anahata" font-size="11" fill="#212529" text-anchor="middle"></text>
                    <circle cx="400" cy="530" r="12" fill="#ffffff" stroke="var(--node-orange)" stroke-width="1.5" />
                    <text x="400" y="534" id="n_ch_svadhisthana" font-size="11" fill="#212529" text-anchor="middle"></text>
                    <circle cx="400" cy="595" r="12" fill="#ffffff" stroke="var(--node-red)" stroke-width="1.5" />
                    <text x="400" y="599" id="n_ch_muladhara_in" font-size="11" fill="#212529" text-anchor="middle"></text>

                    <circle cx="465" cy="400" r="12" fill="#ffebee" stroke="var(--node-orange)" stroke-width="1.5" />
                    <text x="465" y="404" id="n_rel" font-size="11" fill="#212529" text-anchor="middle"></text>
                    <text x="465" y="423" class="lbl-channel" fill="#e91e63" text-anchor="middle">❤️</text>

                    <circle cx="530" cy="400" r="12" fill="#ffffff" stroke="#212529" stroke-width="1.5" />
                    <text x="530" y="404" id="n_bal" font-size="11" fill="#212529" text-anchor="middle"></text>

                    <circle cx="595" cy="400" r="12" fill="#e8f5e9" stroke="#4caf50" stroke-width="1.5" />
                    <text x="595" y="404" id="n_money" font-size="11" fill="#212529" text-anchor="middle"></text>
                    <text x="595" y="423" class="lbl-channel" fill="#2e7d32" text-anchor="middle">$</text>
                </g>

                <g id="microYearsGroup"></g>
            </svg>
        </div>

        <div class="health-card">
            <h2>Карта Здоровья</h2>
            <table>
                <thead>
                    <tr>
                        <th>Чакры</th>
                        <th>Физика (Ф)</th>
                        <th>Энергия (Э)</th>
                        <th>Эмоции (Эм)</th>
                    </tr>
                </thead>
                <tbody id="healthTableBody">
                    </tbody>
            </table>
        </div>
    </div>
</div>

<script>
    // Матричное правило сложения (до 22)
    function reduceArcana(value) {
        if (value <= 0) return 22;
        while (value > 22) {
            value = String(value).split('').reduce((sum, d) => sum + parseInt(d, 10), 0);
        }
        return value;
    }

    function calculateMatrix() {
        const dateInput = document.getElementById('birthdate').value;
        if (!dateInput) return;

        const d = new Date(dateInput);
        const day = d.getDate();
        const month = d.getMonth() + 1;
        const year = d.getFullYear();

        // Главные вершины
        const A = reduceArcana(day);
        const B = reduceArcana(month);
        const C = reduceArcana(year);
        const D = reduceArcana(A + B + C);
        const E = reduceArcana(A + B + C + D);

        document.getElementById('n_A').textContent = A;
        document.getElementById('n_B').textContent = B;
        document.getElementById('n_C').textContent = C;
        document.getElementById('n_D').textContent = D;
        document.getElementById('n_E').textContent = E;

        // Родовые вершины
        const anc10 = reduceArcana(A + B);
        const anc30 = reduceArcana(B + C);
        const anc50 = reduceArcana(C + D);
        const anc70 = reduceArcana(D + A);

        document.getElementById('n_anc10').textContent = anc10;
        document.getElementById('n_anc30').textContent = anc30;
        document.getElementById('n_anc50').textContent = anc50;
        document.getElementById('n_anc70').textContent = anc70;

        // Вертикальный чакральный столб
        const ajna = reduceArcana(B + E);
        const vissudha = reduceArcana(B + ajna);
        const anahata = reduceArcana(E + vissudha);
        const svadhisthana = reduceArcana(D + E);
        const muladhara_in = reduceArcana(D + svadhisthana);

        document.getElementById('n_ch_ajna').textContent = ajna;
        document.getElementById('n_ch_vissudha').textContent = vissudha;
        document.getElementById('n_ch_anahata').textContent = anahata;
        document.getElementById('n_ch_svadhisthana').textContent = svadhisthana;
        document.getElementById('n_ch_muladhara_in').textContent = muladhara_in;

        // Горизонтальный канал благополучия (смещен вправо от центра)
        const rel = reduceArcana(E + C);
        const money = reduceArcana(E + rel);
        const bal = reduceArcana(rel + money);

        document.getElementById('n_rel').textContent = rel;
        document.getElementById('n_money').textContent = money;
        document.getElementById('n_bal').textContent = bal;

        // Отрисовка карты здоровья и внешних пятилеток
        renderHealthCard(A, B, C, D, E, ajna, vissudha, anahata, svadhisthana, muladhara_in);
        renderMicroYears(A, anc10, B, anc30, C, anc50, D, anc70);
    }

    function renderHealthCard(A, B, C, D, E, ajna, vissudha, anahata, svadhisthana, muladhara_in) {
        const rows = [
            { name: "Сахасрара", color: "#9c27b0", p: B, e: B, em: reduceArcana(B + B) },
            { name: "Аджна", color: "#2196f3", p: reduceArcana(A + B), e: ajna, em: reduceArcana(reduceArcana(A + B) + ajna) },
            { name: "Вишудха", color: "#00bcd4", p: reduceArcana(A + C), e: vissudha, em: reduceArcana(reduceArcana(A + C) + vissudha) },
            { name: "Анахата", color: "#4caf50", p: reduceArcana(A + D), e: anahata, em: reduceArcana(reduceArcana(A + D) + anahata) },
            { name: "Манипура", color: "#ffca28", p: E, e: reduceArcana(A + E), em: reduceArcana(E + reduceArcana(A + E)) },
            { name: "Свадхистана", color: "#ff9800", p: reduceArcana(C + D), e: svadhisthana, em: reduceArcana(reduceArcana(C + D) + svadhisthana) },
            { name: "Муладхара", color: "#ef5350", p: A, e: muladhara_in, em: reduceArcana(A + muladhara_in) }
        ];

        let sumP = 0, sumE = 0, sumEm = 0;
        const tbody = document.getElementById('healthTableBody');
        tbody.innerHTML = '';

        rows.forEach(r => {
            sumP += r.p; sumE += r.e; sumEm += r.em;
            const tr = document.createElement('tr');
            tr.innerHTML = `
                <td><div class="chakra-mark"><span class="chakra-badge" style="background-color: ${r.color}"></span>${r.name}</div></td>
                <td>${r.p}</td>
                <td>${r.e}</td>
                <td>${r.em}</td>
            `;
            tbody.appendChild(tr);
        });

        const totalTr = document.createElement('tr');
        totalTr.className = 'total-summary';
        totalTr.innerHTML = `
            <td>ИТОГО</td>
            <td>${reduceArcana(sumP)}</td>
            <td>${reduceArcana(sumE)}</td>
            <td>${reduceArcana(sumEm)}</td>
        `;
        tbody.appendChild(totalTr);
    }

    function renderMicroYears(A, anc10, B, anc30, C, anc50, D, anc70) {
        const container = document.getElementById('microYearsGroup');
        container.innerHTML = '';

        // Координаты внешнего кольца (Радиус 260 от центра 400, 400)
        const points = [
            { val: reduceArcana(A + anc10), cx: 216.16, cy: 308.08, age: "5 лет", ox: -25, oy: 4 },
            { val: reduceArcana(anc10 + B), cx: 308.08, cy: 216.16, age: "15 лет", ox: 0, oy: -15 },
            { val: reduceArcana(B + anc30), cx: 491.92, cy: 216.16, age: "25 лет", ox: 0, oy: -15 },
            { val: reduceArcana(anc30 + C), cx: 583.84, cy: 308.08, age: "35 лет", ox: 25, oy: 4 },
            { val: reduceArcana(C + anc50), cx: 583.84, cy: 491.92, age: "45 лет", ox: 25, oy: 4 },
            { val: reduceArcana(anc50 + D), cx: 491.92, cy: 583.84, age: "55 лет", ox: 0, oy: 18 },
            { val: reduceArcana(D + anc70), cx: 308.08, cy: 583.84, age: "65 лет", ox: 0, oy: 18 },
            { val: reduceArcana(anc70 + A), cx: 216.16, cy: 491.92, age: "75 лет", ox: -25, oy: 4 }
        ];

        points.forEach(p => {
            // Кружок микро-аркана
            const c = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
            c.setAttribute('cx', p.cx);
            c.setAttribute('cy', p.cy);
            c.setAttribute('r', '9');
            c.setAttribute('fill', '#ffffff');
            c.setAttribute('stroke', '#adb5bd');
            c.setAttribute('stroke-width', '1');
            container.appendChild(c);

            // Текст аркана внутри
            const t = document.createElementNS('http://www.w3.org/2000/svg', 'text');
            t.setAttribute('x', p.cx);
            t.setAttribute('y', p.cy + 3);
            t.setAttribute('font-size', '9');
            t.setAttribute('fill', '#212529');
            t.setAttribute('text-anchor', 'middle');
            t.textContent = p.val;
            container.appendChild(t);

            // Текст возраста снаружи
            const l = document.createElementNS('http://www.w3.org/2000/svg', 'text');
            l.setAttribute('x', p.cx + p.ox);
            l.setAttribute('y', p.cy + p.oy);
            l.setAttribute('font-size', '9');
            l.setAttribute('fill', '#868e96');
            l.setAttribute('font-weight', '500');
            l.setAttribute('text-anchor', 'middle');
            l.textContent = p.age;
            container.appendChild(l);
        });
    }

    window.onload = calculateMatrix;
</script>

</body>
</html>
