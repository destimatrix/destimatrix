<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DestiMatrix - Destiny Matrix Calculator</title>
    <style>
        :root {
            --bg-color: #f8f9fa;
            --card-bg: #ffffff;
            --text-main: #212529;
            --text-muted: #6c757d;
            --accent-color: #4f46e5;
            --border-color: #e9ecef;
            --font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            
            /* Chakra Colors */
            --sahasrara: #9c27b0;
            --ajna: #3f51b5;
            --vissudha: #03a9f4;
            --anahata: #4caf50;
            --manipura: #ffeb3b;
            --svadhisthana: #ff9800;
            --muladhara: #f44336;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: var(--font-family);
            background-color: var(--bg-color);
            color: var(--text-main);
            line-height: 1.5;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 30px;
        }

        header {
            text-align: center;
            margin-top: 20px;
        }

        header h1 {
            font-size: 2.5rem;
            font-weight: 800;
            color: var(--text-main);
            letter-spacing: -0.05em;
            margin-bottom: 5px;
        }

        header p {
            color: var(--text-muted);
            font-size: 1rem;
        }

        .calculator-card {
            background: var(--card-bg);
            padding: 30px;
            border-radius: 16px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.05);
            width: 100%;
            max-width: 500px;
            text-align: center;
        }

        .input-group {
            display: flex;
            flex-direction: column;
            gap: 10px;
            text-align: left;
            margin-bottom: 20px;
        }

        .input-group label {
            font-weight: 600;
            font-size: 0.9rem;
            color: var(--text-main);
        }

        .input-group input {
            padding: 12px 16px;
            border: 2px solid var(--border-color);
            border-radius: 8px;
            font-size: 1rem;
            outline: none;
            transition: border-color 0.2s ease;
        }

        .input-group input:focus {
            border-color: var(--accent-color);
        }

        .btn-calc {
            background-color: var(--accent-color);
            color: white;
            border: none;
            padding: 14px 24px;
            font-size: 1rem;
            font-weight: 600;
            border-radius: 8px;
            cursor: pointer;
            width: 100%;
            transition: opacity 0.2s ease;
        }

        .btn-calc:hover {
            opacity: 0.9;
        }

        .workspace {
            display: grid;
            grid-template-columns: 1fr;
            gap: 40px;
            width: 100%;
            margin-top: 20px;
        }

        @media (min-width: 992px) {
            .workspace {
                grid-template-columns: 1.2fr 0.8fr;
                align-items: start;
            }
        }

        .diagram-container {
            background: var(--card-bg);
            padding: 20px;
            border-radius: 16px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.05);
            display: flex;
            justify-content: center;
            align-items: center;
            width: 100%;
        }

        svg {
            width: 100%;
            max-width: 700px;
            height: auto;
            overflow: visible;
        }

        .results-container {
            display: flex;
            flex-direction: column;
            gap: 30px;
        }

        .health-card {
            background: var(--card-bg);
            padding: 25px;
            border-radius: 16px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.05);
        }

        .health-card h2 {
            font-size: 1.3rem;
            font-weight: 700;
            margin-bottom: 15px;
            border-bottom: 2px solid var(--border-color);
            padding-bottom: 10px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            text-align: left;
            font-size: 0.95rem;
        }

        th, td {
            padding: 12px 10px;
            border-bottom: 1px solid var(--border-color);
        }

        th {
            font-weight: 600;
            color: var(--text-muted);
        }

        .chakra-badge {
            display: inline-block;
            width: 12px;
            height: 12px;
            border-radius: 50%;
            margin-right: 8px;
            vertical-align: middle;
        }

        tr.result-row {
            font-weight: 700;
            background-color: var(--bg-color);
        }

        /* SVG Text Styling */
        text {
            font-family: var(--font-family);
            font-weight: 700;
            user-select: none;
        }
        .age-text {
            font-size: 11px;
            fill: #495057;
            font-weight: 600;
        }
        .year-text {
            font-size: 10px;
            fill: #6c757d;
            font-weight: 400;
        }
        .line-label {
            font-size: 12px;
            fill: #495057;
            font-weight: 600;
            letter-spacing: 0.05em;
        }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>DestiMatrix</h1>
        <p>Classic Destiny Matrix Calculator</p>
    </header>

    <div class="calculator
