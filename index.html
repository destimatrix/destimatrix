<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DestiMatrix Calculator</title>

  <style>
    :root {
      --bg: #fbf7f2;
      --card: #ffffff;
      --ink: #2d2522;
      --muted: #8a7a72;
      --line: #d8cbc2;

      --red: #e85d75;
      --pink: #f6a6c9;
      --blue: #58aee8;
      --light-blue: #a9dbf7;
      --green: #6fbe8a;
      --orange: #f2a24b;
      --purple: #9b7be8;
      --yellow: #f3d35b;
      --white: #ffffff;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Inter, Arial, sans-serif;
      background: radial-gradient(circle at top, #fffaf5, var(--bg));
      color: var(--ink);
    }

    .page {
      width: min(1180px, 100%);
      margin: 0 auto;
      padding: 28px 16px 60px;
    }

    .hero {
      text-align: center;
      margin-bottom: 24px;
    }

    .hero h1 {
      margin: 0 0 8px;
      font-size: clamp(32px, 6vw, 62px);
      letter-spacing: -0.06em;
      line-height: 0.95;
    }

    .hero p {
      margin: 0 auto;
      max-width: 620px;
      color: var(--muted);
      font-size: 16px;
      line-height: 1.6;
    }

    .calculator {
      display: grid;
      grid-template-columns: 340px 1fr;
      gap: 22px;
      align-items: start;
    }

    .panel,
    .matrix-card,
    .health-card {
      background: rgba(255, 255, 255, 0.88);
      border: 1px solid rgba(216, 203, 194, 0.8);
      border-radius: 28px;
      box-shadow: 0 20px 60px rgba(64, 44, 34, 0.08);
    }

    .panel {
      padding: 22px;
    }

    label {
      display: block;
      margin-bottom: 8px;
      font-size: 13px;
      font-weight: 700;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }

    input {
      width: 100%;
      height: 52px;
      border-radius: 16px;
      border: 1px solid var(--line);
      padding: 0 14px;
      font-size: 17px;
      color: var(--ink);
      background: #fff;
      outline: none;
    }

    input:focus {
      border-color: var(--orange);
      box-shadow: 0 0 0 4px rgba(242, 162, 75, 0.18);
    }

    button {
      width: 100%;
      height: 52px;
      margin-top: 14px;
      border: 0;
      border-radius: 16px;
      background: var(--ink);
      color: white;
      font-size: 15px;
      font-weight: 800;
      cursor: pointer;
    }

    .summary {
      margin-top: 18px;
      display: grid;
      gap: 10px;
    }

    .summary-row {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      padding: 10px 0;
      border-bottom: 1px solid #eee4dd;
      font-size: 14px;
    }

    .summary-row span:last-child {
      font-weight: 800;
    }

    .matrix-card {
      padding: 18px;
      overflow: hidden;
    }

    .svg-wrap {
      width: 100%;
      overflow: visible;
    }

    svg {
      display: block;
      width: 100%;
      height: auto;
      max-height: 760px;
    }

    .line {
      fill: none;
      stroke: var(--line);
      stroke-width: 2;
    }

    .line-strong {
      fill: none;
      stroke: #b8a99f;
      stroke-width: 2.6;
    }

    .sky {
      stroke: var(--blue);
    }

    .earth {
      stroke: var(--green);
    }

    .male {
      stroke: var(--red);
    }

    .female {
      stroke: var(--pink);
    }

    .circle {
      stroke: #ffffff;
      stroke-width: 4;
      filter: drop-shadow(0 8px 14px rgba(42, 31, 26, 0.13));
    }

    .num {
      font-size: 21px;
      font-weight: 850;
      text-anchor: middle;
      dominant-baseline: middle;
      fill: var(--ink);
    }

   .num {
  font-size: 25px;
  font-weight: 800;
  text-anchor: middle;
  dominant-baseline: middle;
  fill: var(--ink);
}

.small-num {
  font-size: 15px;
  font-weight: 700;
  text-anchor: middle;
  dominant-baseline: middle;
  fill: var(--ink);
}

.age {
  font-size: 8px;
  font-weight: 700;
  text-anchor: middle;
  dominant-baseline: middle;
  fill: #222222;
}

.year-arcana {
  font-size: 9px;
  font-weight: 700;
  text-anchor: middle;
  dominant-baseline: middle;
  fill: #222222;
}

.symbol {
  font-size: 20px;
  font-weight: 900;
  text-anchor: middle;
  dominant-baseline: middle;
  fill: #7fbf4d;
}

.line-label {
  font-size: 9px;
  font-weight: 600;
  text-anchor: middle;
  dominant-baseline: middle;
  fill: #6f6070;
  font-style: italic;
}

    .health-card {
      margin-top: 22px;
      padding: 22px;
    }

    .health-card h2 {
      margin: 0 0 14px;
      font-size: 24px;
      letter-spacing: -0.03em;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      overflow: hidden;
      border-radius: 18px;
      font-size: 14px;
    }

    th,
    td {
      padding: 12px;
      border-bottom: 1px solid #eee4dd;
      text-align: center;
    }

    th {
      color: var(--muted);
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }

    td:first-child,
    th:first-child {
      text-align: left;
      font-weight: 800;
    }

    @media (max-width: 900px) {
      .calculator {
        grid-template-columns: 1fr;
      }

      .panel {
        order: -1;
      }

      .matrix-card {
        padding: 8px;
        border-radius: 20px;
      }

      svg {
        min-width: 620px;
      }

      .svg-wrap {
        overflow-x: auto;
        padding-bottom: 8px;
      }
    }
  </style>
</head>

<body>
  <main class="page">
    <section class="hero">
      <h1>DestiMatrix Calculator</h1>
      <p>Enter your date of birth and calculate your personal Matrix of Destiny based on the 22 Major Arcana system.</p>
    </section>

    <section class="calculator">
      <aside class="panel">
        <label for="birthDate">Date of birth</label>
    <input id="birthDate" type="date" />
        <button id="calculateBtn">Calculate Matrix</button>

        <div class="summary" id="summary"></div>
      </aside>

      <section>
        <div class="matrix-card">
          <div class="svg-wrap">
            <svg id="matrixSvg" viewBox="0 0 760 760" role="img" aria-label="Matrix of Destiny chart"></svg>
          </div>
        </div>

        <div class="health-card">
          <h2>Health Card</h2>
          <div id="healthTable"></div>
        </div>
      </section>
    </section>
  </main>

  <script>
    const svg = document.getElementById("matrixSvg");
    const summary = document.getElementById("summary");
    const healthTable = document.getElementById("healthTable");

    const NS = "http://www.w3.org/2000/svg";

    const colors = {
      red: "#e85d75",
      pink: "#f6a6c9",
      blue: "#58aee8",
      lightBlue: "#a9dbf7",
      green: "#6fbe8a",
      orange: "#f2a24b",
      purple: "#9b7be8",
      yellow: "#f3d35b",
      white: "#ffffff"
    };

    function reduce22(value) {
      let n = Math.abs(Number(value));
      while (n > 22) {
        n = String(n).split("").reduce((sum, digit) => sum + Number(digit), 0);
      }
      return n === 0 ? 22 : n;
    }

    function add22(...values) {
      return reduce22(values.reduce((sum, value) => sum + Number(value), 0));
    }

    function getDateParts(dateValue) {
      const [year, month, day] = dateValue.split("-").map(Number);
      return { day, month, year };
    }

    function calculateMatrix(dateValue) {
      const { day, month, year } = getDateParts(dateValue);

      const D = reduce22(day);
      const M = reduce22(month);
      const Y = reduce22(String(year).split("").reduce((s, d) => s + Number(d), 0));

      const tail = add22(D, M, Y);
      const center = add22(D, M, Y, tail);

      const portrait2 = add22(D, center);
      const portrait3 = add22(D, portrait2);

      const talent2 = add22(M, center);
      const talent3 = add22(M, talent2);

      const material2 = add22(Y, center);
      const material3 = add22(Y, material2);

      const karmic2 = add22(tail, center);
      const karmic3 = add22(tail, karmic2);

      const heartFear1 = add22(portrait2, center);
      const heartFear2 = add22(talent2, center);

      const balance = add22(karmic2, material2);
      const money = add22(material2, balance);
      const love = add22(karmic2, balance);

      const A1 = add22(D, M);
      const B1 = add22(M, Y);
      const C1 = add22(Y, tail);
      const D1 = add22(tail, D);

      const generationPower = add22(A1, B1, C1, D1);

      const A3 = add22(A1, generationPower);
      const B3 = add22(B1, generationPower);
      const C3 = add22(C1, generationPower);
      const D3 = add22(D1, generationPower);

      const A2 = add22(A1, A3);
      const B2 = add22(B1, B3);
      const C2 = add22(C1, C3);
      const D2 = add22(D1, D3);

      const firstSky = add22(M, tail);
      const firstEarth = add22(D, Y);
      const firstMission = add22(firstSky, firstEarth);
      const secondMission = generationPower;
      const thirdMission = add22(firstMission, secondMission);

      return {
        D, M, Y, tail, center,
        portrait2, portrait3,
        talent2, talent3,
        material2, material3,
        karmic2, karmic3,
        heartFear1, heartFear2,
        balance, money, love,
        A1, A2, A3,
        B1, B2, B3,
        C1, C2, C3,
        D1, D2, D3,
        generationPower,
        firstSky, firstEarth, firstMission, secondMission, thirdMission
      };
    }

    function polar(cx, cy, radius, angleDeg) {
      const angle = (angleDeg - 90) * Math.PI / 180;
      return {
        x: cx + radius * Math.cos(angle),
        y: cy + radius * Math.sin(angle)
      };
    }

    function el(name, attrs = {}) {
      const node = document.createElementNS(NS, name);
      Object.entries(attrs).forEach(([key, value]) => node.setAttribute(key, value));
      return node;
    }

    function line(x1, y1, x2, y2, cls = "line") {
      svg.appendChild(el("line", { x1, y1, x2, y2, class: cls }));
    }

    function polygon(points, cls = "line") {
      svg.appendChild(el("polygon", {
        points: points.map(p => `${p.x},${p.y}`).join(" "),
        class: cls
      }));
    }

    function circleNode(x, y, value, fill, r = 24, textClass = "num") {
      svg.appendChild(el("circle", { cx: x, cy: y, r, fill, class: "circle" }));
      const t = el("text", { x, y, class: textClass });
      t.textContent = value;
      svg.appendChild(t);
    }

    function textNode(x, y, value, cls) {
      const t = el("text", { x, y, class: cls });
      t.textContent = value;
      svg.appendChild(t);
    }

    function yearlyArcanaBetween(startValue, endValue, count) {
      const result = new Array(count).fill(null);

      function fill(leftIndex, rightIndex, leftValue, rightValue) {
        if (rightIndex - leftIndex <= 1) return;
        const midIndex = Math.floor((leftIndex + rightIndex) / 2);
        const midValue = add22(leftValue, rightValue);
        result[midIndex] = midValue;
        fill(leftIndex, midIndex, leftValue, midValue);
        fill(midIndex, rightIndex, midValue, rightValue);
      }

      result[0] = startValue;
      result[count - 1] = endValue;
      fill(0, count - 1, startValue, endValue);
      return result;
    }

    function buildYearlyRing(m) {
      const anchors = [
        m.D, m.A1, m.M, m.B1, m.Y, m.C1, m.tail, m.D1
      ];

      const arcana = [];
      for (let i = 0; i < anchors.length; i++) {
        const next = anchors[(i + 1) % anchors.length];
        const segment = yearlyArcanaBetween(anchors[i], next, 6);
        if (i > 0) segment.shift();
        arcana.push(...segment);
      }

      return arcana.slice(0, 40);
    }


     function drawMatrix(m) {
  svg.innerHTML = "";

  const cx = 380;
  const cy = 380;

  const R = 260;
  const ageOffset = 18;
  const arcanaOffset = 40;

  const points = {
    top: { x: cx, y: cy - R },
    topRight: { x: cx + 184, y: cy - 184 },
    right: { x: cx + R, y: cy },
    bottomRight: { x: cx + 184, y: cy + 184 },
    bottom: { x: cx, y: cy + R },
    bottomLeft: { x: cx - 184, y: cy + 184 },
    left: { x: cx - R, y: cy },
    topLeft: { x: cx - 184, y: cy - 184 }
  };

  const outer = [
    points.left,
    points.topLeft,
    points.top,
    points.topRight,
    points.right,
    points.bottomRight,
    points.bottom,
    points.bottomLeft
  ];

  function segmentPoint(a, b, t) {
    return {
      x: a.x + (b.x - a.x) * t,
      y: a.y + (b.y - a.y) * t
    };
  }

  function pushFromCenter(p, amount) {
    const dx = p.x - cx;
    const dy = p.y - cy;
    const length = Math.sqrt(dx * dx + dy * dy);
    return {
      x: p.x + (dx / length) * amount,
      y: p.y + (dy / length) * amount
    };
  }

  function pullToCenter(p, amount) {
    const dx = p.x - cx;
    const dy = p.y - cy;
    const length = Math.sqrt(dx * dx + dy * dy);
    return {
      x: p.x - (dx / length) * amount,
      y: p.y - (dy / length) * amount
    };
  }

  polygon(outer, "line-strong");

  polygon([points.left, points.top, points.right, points.bottom], "line");
  polygon([points.topLeft, points.topRight, points.bottomRight, points.bottomLeft], "line");

  line(points.left.x, points.left.y, points.right.x, points.right.y, "line earth");
  line(points.top.x, points.top.y, points.bottom.x, points.bottom.y, "line sky");

  line(points.topLeft.x, points.topLeft.y, points.bottomRight.x, points.bottomRight.y, "line male");
  line(points.topRight.x, points.topRight.y, points.bottomLeft.x, points.bottomLeft.y, "line female");

  line(cx, cy, points.left.x, points.left.y, "line");
  line(cx, cy, points.top.x, points.top.y, "line");
  line(cx, cy, points.right.x, points.right.y, "line");
  line(cx, cy, points.bottom.x, points.bottom.y, "line");

  const yearly = buildYearlyRing(m);

  const sides = [
    [points.left, points.topLeft, 0],
    [points.topLeft, points.top, 10],
    [points.top, points.topRight, 20],
    [points.topRight, points.right, 30],
    [points.right, points.bottomRight, 40],
    [points.bottomRight, points.bottom, 50],
    [points.bottom, points.bottomLeft, 60],
    [points.bottomLeft, points.left, 70]
  ];

  sides.forEach(([a, b, startAge], sideIndex) => {
    for (let i = 0; i <= 5; i++) {
      const t = i / 5;
      const base = segmentPoint(a, b, t);
      const ageP = pullToCenter(base, ageOffset);
      const arcP = pushFromCenter(base, arcanaOffset);

      const age = startAge + i * 2;
      const arcanaIndex = Math.min(sideIndex * 5 + i, yearly.length - 1);

      textNode(ageP.x, ageP.y, age, "age");
      textNode(arcP.x, arcP.y, yearly[arcanaIndex], "year-arcana");
    }
  });

  const majorNodes = [
    [points.left, m.D, colors.purple],
    [points.topLeft, m.A1, colors.white],
    [points.top, m.M, colors.purple],
    [points.topRight, m.B1, colors.white],
    [points.right, m.Y, colors.red],
    [points.bottomRight, m.C1, colors.white],
    [points.bottom, m.tail, colors.red],
    [points.bottomLeft, m.D1, colors.white]
  ];

  majorNodes.forEach(([p, value, fill]) => {
    circleNode(p.x, p.y, value, fill, 32);
  });

  circleNode(cx, cy, m.center, colors.yellow, 34);

  circleNode(cx, cy - 92, m.talent2, colors.blue, 19, "small-num");
  circleNode(cx, cy - 54, m.talent3, colors.lightBlue, 17, "small-num");
  circleNode(cx, cy - 18, m.firstMission, colors.green, 16, "small-num");

  circleNode(cx - 92, cy, m.portrait2, colors.blue, 19, "small-num");
  circleNode(cx - 54, cy, m.portrait3, colors.lightBlue, 17, "small-num");
  circleNode(cx - 18, cy, m.firstEarth, colors.green, 16, "small-num");

  circleNode(cx + 92, cy, m.material2, colors.orange, 19, "small-num");
  circleNode(cx + 54, cy, m.material3, colors.white, 17, "small-num");

  circleNode(cx, cy + 92, m.karmic2, colors.orange, 19, "small-num");
  circleNode(cx, cy + 54, m.karmic3, colors.white, 17, "small-num");

  circleNode(cx - 96, cy - 96, m.A2, colors.white, 18, "small-num");
  circleNode(cx - 132, cy - 132, m.A3, colors.white, 18, "small-num");

  circleNode(cx + 96, cy - 96, m.B2, colors.white, 18, "small-num");
  circleNode(cx + 132, cy - 132, m.B3, colors.white, 18, "small-num");

  circleNode(cx + 96, cy + 96, m.C2, colors.white, 18, "small-num");
  circleNode(cx + 132, cy + 132, m.C3, colors.white, 18, "small-num");

  circleNode(cx - 96, cy + 96, m.D2, colors.white, 18, "small-num");
  circleNode(cx - 132, cy + 132, m.D3, colors.white, 18, "small-num");

  circleNode(cx + 56, cy - 8, m.heartFear1, colors.white, 16, "small-num");
  circleNode(cx + 88, cy - 8, m.heartFear2, colors.white, 16, "small-num");

  circleNode(cx + 78, cy + 70, m.balance, colors.white, 17, "small-num");
  circleNode(cx + 118, cy + 38, m.money, colors.white, 17, "small-num");
  circleNode(cx + 38, cy + 118, m.love, colors.white, 17, "small-num");

  textNode(cx + 112, cy + 78, "$", "symbol");
  textNode(cx + 38, cy + 82, "♥", "symbol");

  textNode(cx - 70, cy - 74, "male generation line", "line-label");
  textNode(cx + 82, cy - 70, "female generation line", "line-label");
}

    function renderSummary(m) {
      summary.innerHTML = `
        <div class="summary-row"><span>Day Arcana</span><span>${m.D}</span></div>
        <div class="summary-row"><span>Month Arcana</span><span>${m.M}</span></div>
        <div class="summary-row"><span>Year Arcana</span><span>${m.Y}</span></div>
        <div class="summary-row"><span>Karmic Tail</span><span>${m.tail}</span></div>
        <div class="summary-row"><span>Central Arcana</span><span>${m.center}</span></div>
        <div class="summary-row"><span>First Mission</span><span>${m.firstMission}</span></div>
        <div class="summary-row"><span>Second Mission</span><span>${m.secondMission}</span></div>
        <div class="summary-row"><span>Third Mission</span><span>${m.thirdMission}</span></div>
      `;
    }

    function renderHealthCard(m) {
      const rows = [
        ["Sahasrara", m.M, m.talent2],
        ["Ajna", m.talent3, m.heartFear2],
        ["Vishuddha", m.Y, m.material2],
        ["Anahata", m.money, m.balance],
        ["Manipura", m.center, m.generationPower],
        ["Svadhisthana", m.love, m.karmic2],
        ["Muladhara", m.tail, m.karmic3]
      ];

      const htmlRows = rows.map(([chakra, physics, energy]) => {
        const emotions = add22(physics, energy);
        return `
          <tr>
            <td>${chakra}</td>
            <td>${physics}</td>
            <td>${energy}</td>
            <td>${emotions}</td>
          </tr>
        `;
      }).join("");

      const resultPhysics = add22(...rows.map(r => r[1]));
      const resultEnergy = add22(...rows.map(r => r[2]));
      const resultEmotion = add22(...rows.map(r => add22(r[1], r[2])));

      healthTable.innerHTML = `
        <table>
          <thead>
            <tr>
              <th>Chakra</th>
              <th>Physics</th>
              <th>Energy</th>
              <th>Emotions</th>
            </tr>
          </thead>
          <tbody>
            ${htmlRows}
            <tr>
              <td>Result</td>
              <td>${resultPhysics}</td>
              <td>${resultEnergy}</td>
              <td>${resultEmotion}</td>
            </tr>
          </tbody>
        </table>
      `;
    }

    function calculateAndRender() {
      const dateValue = document.getElementById("birthDate").value;
      if (!dateValue) return;

      const matrix = calculateMatrix(dateValue);
      drawMatrix(matrix);
      renderSummary(matrix);
      renderHealthCard(matrix);
    }
    document.getElementById("calculateBtn").addEventListener("click", calculateAndRender);

document.getElementById("birthDate").addEventListener("change", calculateAndRender);
    
svg.innerHTML = "";

summary.innerHTML = `
  <div class="summary-row">
    <span>Status</span>
    <span>Enter your date</span>
  </div>
`;

healthTable.innerHTML = "";

    
  </script>
</body>
</html>
