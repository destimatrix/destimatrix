<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DestiMatrix Chart</title>

  <style>
    :root {
      --ink: #1f2933;
      --purple: #8a43a4;
      --blue: #4f6df5;
      --cyan: #43c7d8;
      --green: #96d852;
      --yellow: #ffec38;
      --orange: #ffa327;
      --red: #f13f3f;
      --money: #9bd44d;
      --border: #1f2933;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      background: #ffffff;
      color: var(--ink);
      font-family: Tahoma, Verdana, Arial, sans-serif;
    }

    .page {
      width: 100%;
      max-width: 1180px;
      margin: 0 auto;
      padding: 18px 14px 50px;
    }

    .form-card {
      border: 1px solid #d9dee7;
      border-radius: 8px;
      padding: 18px 24px;
      margin-bottom: 18px;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 34px;
      align-items: end;
      box-shadow: 0 5px 20px rgba(15, 23, 42, 0.06);
    }

    label {
      display: block;
      margin-bottom: 7px;
      font-size: 15px;
      font-weight: 700;
    }

    input {
      width: 100%;
      height: 48px;
      border: 1px solid #d4dae4;
      border-radius: 6px;
      padding: 0 15px;
      font-size: 20px;
      font-weight: 500;
      color: var(--ink);
      font-family: inherit;
    }

    button {
      width: 100%;
      height: 48px;
      border: none;
      border-radius: 6px;
      background: linear-gradient(180deg, #ff9954, #f38340);
      color: #ffffff;
      font-size: 17px;
      font-weight: 700;
      font-family: inherit;
      cursor: pointer;
    }

    .chart-shell {
      width: 100%;
      overflow-x: auto;
      overflow-y: hidden;
      padding: 4px 0 20px;
    }

    .matrix {
      display: block;
      width: min(100%, 1040px);
      min-width: 760px;
      height: auto;
      margin: 0 auto;
      overflow: visible;
    }

    .base-line {
      fill: none;
      stroke: var(--border);
      stroke-width: 3;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .thin-line {
      stroke: var(--border);
      stroke-width: 1.15;
    }

    .male-line {
      stroke: var(--purple);
      stroke-width: 2.8;
      marker-end: url(#arrowPurple);
    }

    .female-line {
      stroke: var(--red);
      stroke-width: 2.8;
      marker-end: url(#arrowRed);
    }

    .dashed-line {
      stroke: var(--border);
      stroke-width: 1.35;
      stroke-dasharray: 7 7;
    }

    .node-circle {
      stroke: var(--border);
      stroke-width: 3;
    }

    .node-text {
      text-anchor: middle;
      dominant-baseline: central;
      font-family: Tahoma, Verdana, Arial, sans-serif;
      font-weight: 500;
      fill: var(--ink);
    }

    .text-white {
      fill: #ffffff;
    }

    .text-big {
      font-size: 60px;
      font-weight: 500;
    }

    .text-medium {
      font-size: 42px;
      font-weight: 500;
    }

    .text-small {
      font-size: 29px;
      font-weight: 500;
    }

    .outer-number {
      text-anchor: middle;
      dominant-baseline: central;
      font-size: 21px;
      font-weight: 400;
      fill: #001a38;
    }

    .age-major {
      text-anchor: middle;
      font-size: 13px;
      font-weight: 700;
      fill: #111827;
      line-height: 1;
    }

    .age-small {
      text-anchor: middle;
      dominant-baseline: central;
      font-size: 8.5px;
      font-weight: 500;
      fill: #4b5563;
    }

    .tick-filled {
      fill: var(--border);
      stroke: var(--border);
      stroke-width: 1;
    }

    .tick-open {
      fill: #ffffff;
      stroke: var(--border);
      stroke-width: 2;
    }

    .line-label {
      fill: #111827;
      font-size: 18px;
      font-weight: 400;
    }

    .symbol {
      text-anchor: middle;
      dominant-baseline: central;
      font-size: 35px;
      font-weight: 700;
    }

    @media (max-width: 720px) {
      .page {
        padding: 12px 8px 36px;
      }

      .form-card {
        grid-template-columns: 1fr;
        gap: 12px;
        padding: 14px;
      }

      .matrix {
        min-width: 720px;
      }
    }
  </style>
</head>

<body>
  <main class="page">
    <form class="form-card" id="chartForm">
      <div>
        <label for="birthdate">Date of birth</label>
        <input id="birthdate" type="text" value="28.05.1994" placeholder="DD.MM.YYYY">
      </div>
      <button type="submit">Calculate</button>
    </form>

    <section class="chart-shell">
      <svg class="matrix" viewBox="0 0 1000 1000" aria-label="Destiny Matrix chart">
        <defs>
          <marker id="arrowPurple" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto">
            <path d="M0,0 L9,4.5 L0,9 Z" fill="#8a43a4"></path>
          </marker>
          <marker id="arrowRed" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto">
            <path d="M0,0 L9,4.5 L0,9 Z" fill="#f13f3f"></path>
          </marker>
        </defs>

        <g id="yearArcanaLayer"></g>
        <g id="ageLayer"></g>
        <g id="tickLayer"></g>

        <polygon class="base-line" points="500,70 778,185 930,500 778,815 500,930 222,815 70,500 222,185"></polygon>
        <polygon class="base-line" points="500,110 890,500 500,890 110,500"></polygon>
        <rect class="base-line" x="222" y="222" width="556" height="556"></rect>

        <line class="thin-line" x1="500" y1="110" x2="500" y2="890"></line>
        <line class="thin-line" x1="110" y1="500" x2="890" y2="500"></line>

        <line class="male-line" x1="315" y1="315" x2="710" y2="710"></line>
        <line class="female-line" x1="685" y1="315" x2="315" y2="685"></line>

        <line class="dashed-line" x1="500" y1="778" x2="778" y2="500"></line>

        <text class="line-label" x="360" y="386" transform="rotate(45 360 386)">male generation line</text>
        <text class="line-label" x="622" y="392" transform="rotate(-45 622 392)">female generation line</text>

        <text class="symbol" x="650" y="555" fill="#9bd44d">$</text>
        <text class="symbol" x="555" y="652" fill="#f13f3f">❤</text>

        <g id="nodeLayer"></g>
      </svg>
    </section>
  </main>

  <script>
    const COLORS = {
      purple: '#8a43a4',
      blue: '#4f6df5',
      cyan: '#43c7d8',
      green: '#96d852',
      yellow: '#ffec38',
      orange: '#ffa327',
      red: '#f13f3f',
      white: '#ffffff'
    };

    const OUTER_POINTS = [
      [70, 500],
      [222, 185],
      [500, 70],
      [778, 185],
      [930, 500],
      [778, 815],
      [500, 930],
      [222, 815]
    ];

    const MAIN_AGES = [
      [42, 502, ['0', 'years', 'old']],
      [176, 174, ['10', 'years', 'old']],
      [500, 40, ['20', 'years', 'old']],
      [824, 174, ['30', 'years', 'old']],
      [958, 502, ['40', 'years', 'old']],
      [824, 842, ['50', 'years', 'old']],
      [500, 970, ['60', 'years', 'old']],
      [176, 842, ['70', 'years', 'old']]
    ];

    const NODES = [
      ['b', 500, 110, 58, 'purple', 'big'],
      ['b2', 500, 185, 40, 'blue', 'medium'],
      ['b1', 500, 252, 29, 'cyan', 'small'],
      ['b3', 500, 370, 29, 'green', 'small'],

      ['a', 110, 500, 58, 'purple', 'big'],
      ['a2', 188, 500, 40, 'blue', 'medium'],
      ['a1', 252, 500, 29, 'cyan', 'small'],
      ['a3', 375, 500, 29, 'green', 'small'],

      ['c', 890, 500, 58, 'red', 'big'],
      ['c2', 810, 500, 40, 'white', 'medium'],
      ['c1', 748, 500, 29, 'orange', 'small'],

      ['d', 500, 890, 58, 'red', 'big'],
      ['d2', 500, 812, 40, 'white', 'medium'],
      ['d1', 500, 748, 29, 'orange', 'small'],

      ['e', 500, 500, 60, 'yellow', 'big'],

      ['e1', 580, 500, 34, 'white', 'small'],
      ['e2', 636, 500, 29, 'white', 'small'],

      ['f', 222, 185, 55, 'white', 'big'],
      ['f2', 283, 245, 37, 'white', 'medium'],
      ['f3', 334, 306, 29, 'white', 'small'],

      ['g', 778, 185, 55, 'white', 'big'],
      ['g2', 716, 245, 37, 'white', 'medium'],
      ['g3', 666, 306, 29, 'white', 'small'],

      ['y', 778, 815, 55, 'white', 'big'],
      ['y2', 716, 755, 37, 'white', 'medium'],
      ['y3', 666, 694, 29, 'white', 'small'],

      ['k', 222, 815, 55, 'white', 'big'],
      ['k2', 283, 755, 37, 'white', 'medium'],
      ['k3', 334, 694, 29, 'white', 'small'],

      ['x1', 560, 705, 29, 'white', 'small'],
      ['x', 622, 622, 29, 'white', 'small'],
      ['x2', 700, 545, 29, 'white', 'small']
    ];

    function reduceArcana(number) {
      let value = Number(number);
      while (value > 22) {
        value = String(value).split('').reduce((sum, digit) => sum + Number(digit), 0);
      }
      return value;
    }

    function parseDate(value) {
      const match = String(value).trim().match(/^(\\d{2})[./-](\\d{2})[./-](\\d{4})$/);
      if (!match) return null;
      return {
        day: Number(match[1]),
        month: Number(match[2]),
        year: match[3]
      };
    }

    function calculate(dateValue) {
      const parsed = parseDate(dateValue);

      if (!parsed) {
        alert('Please enter date in DD.MM.YYYY format');
        return null;
      }

      const a = reduceArcana(parsed.day);
      const b = reduceArcana(parsed.month);
      const c = reduceArcana(String(parsed.year).split('').reduce((sum, digit) => sum + Number(digit), 0));
      const d = reduceArcana(a + b + c);
      const e = reduceArcana(a + b + c + d);

      const a1 = reduceArcana(a + e);
      const a2 = reduceArcana(a + a1);
      const a3 = reduceArcana(a1 + e);

      const b1 = reduceArcana(b + e);
      const b2 = reduceArcana(b + b1);
      const b3 = reduceArcana(b1 + e);

      const c1 = reduceArcana(c + e);
      const c2 = reduceArcana(c + c1);

      const d1 = reduceArcana(d + e);
      const d2 = reduceArcana(d + d1);

      const e1 = reduceArcana(c1 + d1);
      const e2 = reduceArcana(c1 + e1);
      const e4 = reduceArcana(d1 + e1);

      const f = reduceArcana(a + b);
      const g = reduceArcana(b + c);
      const y = reduceArcana(c + d);
      const k = reduceArcana(d + a);

      const generationPower = reduceArcana(f + g + y + k);

      const f3 = reduceArcana(f + generationPower);
      const f2 = reduceArcana(f + f3);

      const g3 = reduceArcana(g + generationPower);
      const g2 = reduceArcana(g + g3);

      const y3 = reduceArcana(y + generationPower);
      const y2 = reduceArcana(y + y3);

      const k3 = reduceArcana(k + generationPower);
      const k2 = reduceArcana(k + k3);

      const x = reduceArcana(c1 + d1);
      const x2 = reduceArcana(c1 + x);
      const x1 = reduceArcana(d1 + x);

      return { a,b,c,d,e,a1,a2,a3,b1,b2,b3,c1,c2,d1,d2,e1,e2,e4,f,g,y,k,f2,f3,g2,g3,y2,y3,k2,k3,x,x1,x2 };
    }

    function middleSequence(start, end) {
      const middle = reduceArcana(start + end);
      const firstMiddle = reduceArcana(start + middle);
      const secondMiddle = reduceArcana(middle + end);
      const firstLeft = reduceArcana(start + firstMiddle);
      const firstRight = reduceArcana(firstMiddle + middle);
      const secondLeft = reduceArcana(middle + secondMiddle);
      const secondRight = reduceArcana(secondMiddle + end);

      return [firstLeft, firstMiddle, firstRight, middle, secondLeft, secondMiddle, secondRight];
    }

    function pointBetween(p1, p2, t) {
      return [
        p1[0] + (p2[0] - p1[0]) * t,
        p1[1] + (p2[1] - p1[1]) * t
      ];
    }

    function normalOffset(p1, p2, distance) {
      const dx = p2[0] - p1[0];
      const dy = p2[1] - p1[1];
      const length = Math.sqrt(dx * dx + dy * dy) || 1;
      return [-dy / length * distance, dx / length * distance];
    }

    function formatAge(value) {
      return String(value).replace('.25', ',25').replace('.5', ',5').replace('.75', ',75');
    }

    function drawStaticOuter() {
      const tickLayer = document.getElementById('tickLayer');
      const ageLayer = document.getElementById('ageLayer');

      let ticks = '';
      let ages = '';

      MAIN_AGES.forEach(([x, y, lines]) => {
        ages += `<text class="age-major" x="${x}" y="${y}">`;
        lines.forEach((line, index) => {
          ages += `<tspan x="${x}" dy="${index === 0 ? 0 : 12}">${line}</tspan>`;
        });
        ages += `</text>`;
      });

      for (let side = 0; side < OUTER_POINTS.length; side++) {
        const p1 = OUTER_POINTS[side];
        const p2 = OUTER_POINTS[(side + 1) % OUTER_POINTS.length];

        const inner = side <= 3 ? normalOffset(p1, p2, 20) : normalOffset(p1, p2, -20);

        for (let i = 1; i <= 8; i++) {
          const t = i / 9;
          const [x, y] = pointBetween(p1, p2, t);
          const open = i === 2 || i === 6;

          ticks += `<circle class="${open ? 'tick-open' : 'tick-filled'}" cx="${x}" cy="${y}" r="${open ? 4.8 : 3.4}"></circle>`;

          const lx = x + inner[0];
          const ly = y + inner[1];

          if (open) {
            const bigAge = side * 10 + (i === 2 ? 5 : 15);
            ages += `<text class="age-major" x="${lx}" y="${ly - 7}">${bigAge}<tspan x="${lx}" dy="11">years</tspan><tspan x="${lx}" dy="11">old</tspan></text>`;
          } else {
            const start = side * 10 + (i - 1) * 1.25;
            const end = start + 1.25;
            ages += `<text class="age-small" x="${lx}" y="${ly}">${formatAge(start)}-${formatAge(end)}</text>`;
          }
        }
      }

      tickLayer.innerHTML = ticks;
      ageLayer.innerHTML = ages;
    }

    function drawYearArcana(data) {
      const layer = document.getElementById('yearArcanaLayer');
      const keys = ['a', 'f', 'b', 'g', 'c', 'y', 'd', 'k'];

      let html = '';

      for (let side = 0; side < OUTER_POINTS.length; side++) {
        const p1 = OUTER_POINTS[side];
        const p2 = OUTER_POINTS[(side + 1) % OUTER_POINTS.length];
        const values = middleSequence(data[keys[side]], data[keys[(side + 1) % keys.length]]);

        const outer = side <= 3 ? normalOffset(p1, p2, -33) : normalOffset(p1, p2, 33);

        values.forEach((value, index) => {
          const [x, y] = pointBetween(p1, p2, (index + 1) / 8);
          html += `<text class="outer-number" x="${x + outer[0]}" y="${y + outer[1]}">${value}</text>`;
        });
      }

      layer.innerHTML = html;
    }

    function drawNodes(data) {
      const layer = document.getElementById('nodeLayer');
      let html = '';

      NODES.forEach(([key, x, y, r, color, size]) => {
        const fill = COLORS[color];
        const textWhite = ['purple', 'blue', 'red', 'orange'].includes(color);
        const textClass = size === 'big' ? 'text-big' : size === 'medium' ? 'text-medium' : 'text-small';

        html += `
          <circle class="node-circle" cx="${x}" cy="${y}" r="${r}" fill="${fill}"></circle>
          <text class="node-text ${textClass} ${textWhite ? 'text-white' : ''}" x="${x}" y="${y}">${data[key] ?? ''}</text>
        `;
      });

      layer.innerHTML = html;
    }

    function render() {
      const data = calculate(document.getElementById('birthdate').value);
      if (!data) return;

      drawYearArcana(data);
      drawNodes(data);
    }

    document.getElementById('chartForm').addEventListener('submit', (event) => {
      event.preventDefault();
      render();
    });

    drawStaticOuter();
    render();
  </script>
</body>
</html>
