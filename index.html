<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DestiMatrix - Classic Destiny Matrix</title>
    <style>
        :root {
            --bg-color: #fcfbfa;
            --card-bg: #ffffff;
            --text-main: #2D3142;
            --text-muted: #9095A9;
            --accent-color: #7209B7;
            --border-color: #E2E4E9;
            --font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            
            /* Calibrated Chakra & Node Colors */
            --c-purple: #B5179E;   /* Sahasrara / Top */
            --c-blue: #4CC9F0;     /* Ajna */
            --c-cyan: #4895EF;     /* Vissudha */
            --c-green: #4CAF50;    /* Anahata / Money Channel Base */
            --c-yellow: #F72585;   /* Manipura / Center (Classic Magenta/Pink accent) */
            --c-orange: #F57C00;   /* Svadhisthana / Love Channel Base */
            --c-red: #E63946;      /* Muladhara / Bottom */
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: var(--font-family);
            background-color: var(--bg-color);
            color: var(--text-main);
            padding: 20px;
            display: flex;
            justify-content: center;
        }

        .container {
            width: 100%;
            max-width: 1200px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 24px;
        }

        header {
            text-align: center;
            margin: 10px 0;
        }

        header h1 {
            font-size: 2.2rem;
            font-weight: 800;
            letter-spacing: -0.04em;
            color: var(--text-main);
            text-transform: uppercase;
        }

        header p {
            color: var(--text-muted);
            font-size: 0.95rem;
            margin-top: 4px;
        }

        .calculator-card {
            background: var(--card-bg);
            padding: 24px;
            border-radius: 20px;
            border: 1px solid var(--border-color);
            width: 100%;
            max-width: 440px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.02);
            text-align: center;
        }

        .input-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
            text-align: left;
            margin-bottom: 16px;
        }

        .input-group label {
            font-weight: 600;
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: var(--text-muted);
        }

        .input-group input {
            padding: 14px 16px;
            border: 1.5px solid var(--border-color);
            border-radius: 12px;
            font-size: 1rem;
            font-family: inherit;
            color: var(--text-main);
            outline: none;
            background-color: #F8F9FA;
            transition: all 0.2s ease;
        }

        .input-group input:focus {
            border-color: var(--accent-color);
            background-color: #fff;
            box-shadow: 0 0 0 4px rgba(114, 9, 183, 0.1);
        }

        .btn-calc {
            background-color: var(--text-main);
            color: white;
            border: none;
            padding: 14px;
            font-size: 1rem;
            font-weight: 600;
            border-radius: 12px;
            cursor: pointer;
            width: 100%;
            transition: background-color 0.2s;
        }

        .btn-calc:hover {
            background-color: var(--accent-color);
        }

        .workspace {
            display: grid;
            grid-template-columns: 1fr;
            gap: 32px;
            width: 100%;
            margin-top: 10px;
        }

        @media (min-width: 992px) {
            .workspace {
                grid-template-columns: 1.1fr 0.9fr;
                align-items: start;
            }
        }

        .diagram-container {
            background: var(--card-bg);
            padding: 16px;
            border-radius: 24px;
            border: 1px solid var(--border-color);
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.02);
        }

        svg {
            width: 100%;
            max-width: 640px;
            height: auto;
        }

        .health-card {
            background: var(--card-bg);
            padding: 24px;
            border-radius: 24px;
            border: 1px solid var(--border-color);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.02);
        }

        .health-card h2 {
            font-size: 1.25rem;
            font-weight: 700;
            margin-bottom: 16px;
            letter-spacing: -0.02em;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.9rem;
        }

        th, td {
            padding: 12px 8px;
            border-bottom: 1px solid var(--border-color);
        }

        th {
            font-weight: 600;
            color: var(--text-muted);
            text-transform: uppercase;
            font-size: 0.75rem;
            letter-spacing: 0.05em;
        }

        .chakra-target {
            display: flex;
            align-items: center;
            gap: 10px;
            font-weight: 600;
        }

        .chakra-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
        }

        tr.result-row {
            font-weight: 700;
            background-color: #F8F9FA;
        }
        
        tr.result-row td {
            border-bottom: none;
        }

        /* SVG Typographic enhancements */
        text {
            font-family: var(--font-family);
            font-weight: 700;
            user-select: none;
        }
        .age-lbl {
            font-size: 11px;
            fill: #7A8293;
            font-weight: 500;
        }
        .year-lbl {
            font-size: 10px;
            fill: #2D3142;
            font-weight: 700;
        }
        .gen-line-text {
            font-size: 10px;
            fill: #A0A5B5;
            font-weight: 500;
            letter-spacing: 0.03em;
        }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>DestiMatrix</h1>
        <p>Classic 22 Arcana Personal Destiny Diagram</p>
    </header>

    <div class="calculator-card">
        <div class="input-group">
            <label for="birthdate">Date of Birth</label>
            <input type="date" id="birthdate" value="1994-05-28">
        </div>
        <button class="btn-calc" onclick="runDestinyCalculation()">Generate Matrix</button>
    </div>

    <div class="workspace">
        <div class="diagram-container">
            <svg id="matrixCanvas" viewBox="0 0 800 800" xmlns="http://www.w3.org/2000/svg">
                <g id="gridGeometry">
                    <circle cx="400" cy="400" r="250" stroke="#E2E4E9" stroke-width="1" fill="none" />
                    <circle cx="400" cy="400" r="150" stroke="#E2E4E9" stroke-width="1" stroke-dasharray="4,4" fill="none" />

                    <rect x="223.22" y="223.22" width="353.55" height="353.55" transform="rotate(45 400 400)" stroke="#9095A9" stroke-width="1.2" fill="none" />
                    <rect x="223.22" y="223.22" width="353.55" height="353.55" stroke="#2D3142" stroke-width="1.5" fill="none" />

                    <line x1="150" y1="400" x2="650" y2="400" stroke="#2D3142" stroke-width="1" />
                    <line x1="400" y1="150" x2="400" y2="650" stroke="#2D3142" stroke-width="1" />

                    <line x1="223.22" y1="223.22" x2="576.78" y2="576.78" stroke="#9095A9" stroke-width="1" stroke-dasharray="2,2" />
                    <line x1="576.78" y1="223.22" x2="223.22" y2="576.78" stroke="#9095A9" stroke-width="1" stroke-dasharray="2,2" />
                    
                    <line x1="400" y1="400" x2="576.78" y2="576.78" stroke="#2D3142" stroke-width="1.2" />
                </g>

                <g id="staticLabels">
                    <text x="290" y="280" class="gen-line-text" transform="rotate(45 290 280)" text-anchor="middle">male generation line</text>
                    <text x="510" y="280" class="gen-line-text" transform="rotate(-45 510 280)" text-anchor="middle">female generation line</text>

                    <text x="400" y="190" class="age-lbl" text-anchor="middle">20 y.o.</text>
                    <text x="590" y="240" class="age-lbl" text-anchor="start">30 y.o.</text>
                    <text x="610" y="405" class="age-lbl" text-anchor="end">40 y.o.</text>
                    <text x="590" y="570" class="age-lbl" text-anchor="start">50 y.o.</text>
                    <text x="400" y="620" class="age-lbl" text-anchor="middle">60 y.o.</text>
                    <text x="210" y="570" class="age-lbl" text-anchor="end">70 y.o.</text>
                    <text x="190" y="405" class="age-lbl" text-anchor="start">0 y.o.</text>
                    <text x="210" y="240" class="age-lbl" text-anchor="end">10 y.o.</text>
                </g>

                <g id="interactiveNodes">
                    <circle cx="400" cy="150" r="22" fill="#E8D7F5" stroke="#B5179E" stroke-width="2" />
                    <text x="400" y="156" id="v_B" fill="#2D3142" font-size="16" text-anchor="middle"></text>

                    <circle cx="650" cy="400" r="22" fill="#FFE3E3" stroke="#E63946" stroke-width="2" />
                    <text x="650" y="406" id="v_C" fill="#2D3142" font-size="16" text-anchor="middle"></text>

                    <circle cx="400" cy="650" r="22" fill="#FFE3E3" stroke="#E63946" stroke-width="2" />
                    <text x="400" y="656" id="v_D" fill="#2D3142" font-size="16" text-anchor="middle"></text>

                    <circle cx="150" cy="400" r="22" fill="#E8D7F5" stroke="#B5179E" stroke-width="2" />
                    <text x="150" y="406" id="v_A" fill="#2D3142" font-size="16" text-anchor="middle"></text>

                    <circle cx="400" cy="400" r="26" fill="#FFF0F5" stroke="#F72585" stroke-width="2.5" />
                    <text x="400" y="406" id="v_E" fill="#2D3142" font-size="18" text-anchor="middle"></text>

                    <circle cx="223.22" cy="223.22" r="18" fill="#ffffff" stroke="#9095A9" stroke-width="1.5" />
                    <text x="223.22" y="228" id="v_anc_tl" fill="#2D3142" font-size="13" text-anchor="middle"></text>
                    <circle cx="576.78" cy="223.22" r="18" fill="#ffffff" stroke="#9095A9" stroke-width="1.5" />
                    <text x="576.78" y="228" id="v_anc_tr" fill="#2D3142" font-size="13" text-anchor="middle"></text>
                    <circle cx="576.78" cy="576.78" r="18" fill="#ffffff" stroke="#9095A9" stroke-width="1.5" />
                    <text x="576.78" y="582" id="v_anc_br" fill="#2D3142" font-size="13" text-anchor="middle"></text>
                    <circle cx="223.22" cy="576.78" r="18" fill="#ffffff" stroke="#9095A9" stroke-width="1.5" />
                    <text x="223.22" y="582" id="v_anc_bl" fill="#2D3142" font-size="13" text-anchor="middle"></text>

                    <circle cx="400" cy="220" r="13" fill="#E3F2FD" stroke="#4CC9F0" stroke-width="1.5" />
                    <text x="400" y="224" id="v_ch_ajna" fill="#2D3142" font-size="11" text-anchor="middle"></text>

                    <circle cx="400" cy="280" r="13" fill="#E3F2FD" stroke="#4895EF" stroke-width="1.5" />
                    <text x="400" y="284" id="v_ch_vissudha" fill="#2D3142" font-size="11" text-anchor="middle"></text>

                    <circle cx="400" cy="340" r="13" fill="#E8F5E9" stroke="#4CAF50" stroke-width="1.5" />
                    <text x="400" y="344" id="v_ch_anahata" fill="#2D3142" font-size="11" text-anchor="middle"></text>

                    <circle cx="330" cy="400" r="13" fill="#E8F5E9" stroke="#4CAF50" stroke-width="1.5" />
                    <text x="330" y="404" id="v_ch_manipura_l" fill="#2D3142" font-size="11" text-anchor="middle"></text>

                    <circle cx="400" cy="520" r="13" fill="#FFF3E0" stroke="#F57C00" stroke-width="1.5" />
                    <text x="400" y="524" id="v_ch_svadhisthana" fill="#2D3142" font-size="11" text-anchor="middle"></text>

                    <circle cx="400" cy="580" r="13" fill="#FFE3E3" stroke="#E63946" stroke-width="1.5" />
                    <text x="400" y="584" id="v_ch_muladhara_in" fill="#2D3142" font-size="11" text-anchor="middle"></text>

                    <circle cx="450" cy="450" r="13" fill="#FFF3E0" stroke="#F57C00" stroke-width="1.5" />
                    <text x="450" y="454" id="v_ch_rel_ent" fill="#2D3142" font-size="11" text-anchor="middle"></text>

                    <circle cx="520" cy="400" r="13" fill="#E8F5E9" stroke="#4CAF50" stroke-width="1.5" />
                    <text x="520" y="404" id="v_ch_money_ent" fill="#2D3142" font-size="11" text-anchor="middle"></text>

                    <circle cx="580" cy="400" r="13" fill="#FFE3E3" stroke="#E63946" stroke-width="1.5" />
                    <text x="580" y="404" id="v_ch_money_mid" fill="#2D3142" font-size="11" text-anchor="middle"></text>

                    <circle cx="488.39" cy="488.39" r="14" fill="#ffffff" stroke="#2D3142" stroke-width="1.5" />
                    <text x="488.39" y="492.5" id="v_ch_well_bal" fill="#2D3142" font-size="11" text-anchor="middle"></text>

                    <circle cx="525" cy="450" r="13" fill="#ffffff" stroke="#4CAF50" stroke-width="1.2" />
                    <text x="525" y="454" id="v_ch_prof" fill="#2D3142" font-size="11" text-anchor="middle"></text>

                    <circle cx="450" cy="525" r="13" fill="#ffffff" stroke="#F57C00" stroke-width="1.2" />
                    <text x="450" y="529" id="v_ch_partner" fill="#2D3142" font-size="11" text-anchor="middle"></text>
                </g>

                <g id="outerYearRingLayer"></g>
            </svg>
        </div>

        <div class="health-card">
            <h2>Health Card Matrix</h2>
            <table>
                <thead>
                    <tr>
                        <th>Chakra Spectrum Designation</th>
                        <th>Physics (P)</th>
                        <th>Energy (E)</th>
                        <th>Emotions (Em)</th>
                    </tr>
                </thead>
                <tbody id="healthTableDataBody">
                    </tbody>
            </table>
        </div>
    </div>
</div>

<script>
    // Pure 22 Matrix Base Reduction Helper Rule
    function parseToArcanaLimit(computedValue) {
        if (computedValue <= 0) return 22;
        while (computedValue > 22) {
            computedValue = String(computedValue).split('').reduce((sum, strDigit) => sum + parseInt(strDigit, 10), 0);
        }
        return computedValue;
    }

    function runDestinyCalculation() {
        const structuralDateInput = document.getElementById('birthdate').value;
        if (!structuralDateInput) return;

        const dateParts = new Date(structuralDateInput);
        const dayRaw = dateParts.getDate();
        const monthRaw = dateParts.getMonth() + 1;
        const yearRaw = dateParts.getFullYear();

        // Major Coordinate Points Formulations
        const A = parseToArcanaLimit(dayRaw);
        const B = parseToArcanaLimit(monthRaw);
        const C = parseToArcanaLimit(yearRaw);
        const D = parseToArcanaLimit(A + B + C);
        const E = parseToArcanaLimit(A + B + C + D);

        // Map Values onto Core Visible Nodes
        document.getElementById('v_A').textContent = A;
        document.getElementById('v_B').textContent = B;
        document.getElementById('v_C').textContent = C;
        document.getElementById('v_D').textContent = D;
        document.getElementById('v_E').textContent = E;

        // Ancestral Lineage Corner Points Calculations
        const ancTL = parseToArcanaLimit(A + B);
        const ancTR = parseToArcanaLimit(B + C);
        const ancBR = parseToArcanaLimit(C + D);
        const ancBL = parseToArcanaLimit(D + A);

        document.getElementById('v_anc_tl').textContent = ancTL;
        document.getElementById('v_anc_tr').textContent = ancTR;
        document.getElementById('v_anc_br').textContent = ancBR;
        document.getElementById('v_anc_bl').textContent = ancBL;

        // Internalized Systemic Chakra Nodes
        const ajna = parseToArcanaLimit(B + E);
        const vissudha = parseToArcanaLimit(B + ajna);
        const anahata = parseToArcanaLimit(E + vissudha);
        const manipura_l = parseToArcanaLimit(A + E);
        const svadhisthana = parseToArcanaLimit(D + E);
        const muladhara_in = parseToArcanaLimit(D + svadhisthana);

        document.getElementById('v_ch_ajna').textContent = ajna;
        document.getElementById('v_ch_vissudha').textContent = vissudha;
        document.getElementById('v_ch_anahata').textContent = anahata;
        document.getElementById('v_ch_manipura_l').textContent = manipura_l;
        document.getElementById('v_ch_svadhisthana').textContent = svadhisthana;
        document.getElementById('v_ch_muladhara_in').textContent = muladhara_in;

        // Specific Wealth and Relationship Channels Logic mapping
        const money_ent = parseToArcanaLimit(C + E);
        const money_mid = parseToArcanaLimit(C + money_ent);
        const rel_ent = parseToArcanaLimit(D + E);
        const well_bal = parseToArcanaLimit(money_ent + rel_ent);
        const prof = parseToArcanaLimit(money_ent + well_bal);
        const partner = parseToArcanaLimit(rel_ent + well_bal);

        document.getElementById('v_ch_money_ent').textContent = money_ent;
        document.getElementById('v_ch_money_mid').textContent = money_mid;
        document.getElementById('v_ch_rel_ent').textContent = rel_ent;
        document.getElementById('v_ch_well_bal').textContent = well_bal;
        document.getElementById('v_ch_prof').textContent = prof;
        document.getElementById('v_ch_partner').textContent = partner;

        // Populate Health Matrix Output Elements
        renderHealthDataCard(A, B, C, D, E, ajna, vissudha, anahata, manipura_l, svadhisthana, muladhara_in);

        // Inject Dynamic External Year Points Outside Border Shell Boundary Lines
        generateExternalYearLabels(A, ancTL, B, ancTR, C, ancBR, D, ancBL);
    }

    function renderHealthDataCard(A, B, C, D, E, ajna, vissudha, anahata, manipura_l, svadhisthana, muladhara_in) {
        const schema = [
            { id: "Sahasrara", clr: "var(--c-purple)", p: B, e: B, em: parseToArcanaLimit(B + B) },
            { id: "Ajna", clr: "var(--c-blue)", p: parseToArcanaLimit(A + B), e: ajna, em: parseToArcanaLimit(parseToArcanaLimit(A + B) + ajna) },
            { id: "Vissudha", clr: "var(--c-cyan)", p: parseToArcanaLimit(A + C), e: vissudha, em: parseToArcanaLimit(parseToArcanaLimit(A + C) + vissudha) },
            { id: "Anahata", clr: "var(--c-green)", p: parseToArcanaLimit(A + D), e: anahata, em: parseToArcanaLimit(parseToArcanaLimit(A + D) + anahata) },
            { id: "Manipura", clr: "var(--c-yellow)", p: E, e: manipura_l, em: parseToArcanaLimit(E + manipura_l) },
            { id: "Svadhisthana", clr: "var(--c-orange)", p: parseToArcanaLimit(C + D), e: svadhisthana, em: parseToArcanaLimit(parseToArcanaLimit(C + D) + svadhisthana) },
            { id: "Muladhara", clr: "var(--c-red)", p: A, e: muladhara_in, em: parseToArcanaLimit(A + muladhara_in) }
        ];

        let totalP = 0, totalE = 0, totalEm = 0;
        const targetBody = document.getElementById('healthTableDataBody');
        targetBody.innerHTML = '';

        schema.forEach(item => {
            totalP += item.p;
            totalE += item.e;
            totalEm += item.em;

            const trNode = document.createElement('tr');
            trNode.innerHTML = `
                <td><div class="chakra-target"><span class="chakra-dot" style="background-color: ${item.clr}"></span>${item.id}</div></td>
                <td>${item.p}</td>
                <td>${item.e}</td>
                <td>${item.em}</td>
            `;
            targetBody.appendChild(trNode);
        });

        const totalRow = document.createElement('tr');
        totalRow.className = 'result-row';
        totalRow.innerHTML = `
            <td><strong>Result Summary</strong></td>
            <td><strong>${parseToArcanaLimit(totalP)}</strong></td>
            <td><strong>${parseToArcanaLimit(totalE)}</strong></td>
            <td><strong>${parseToArcanaLimit(totalEm)}</strong></td>
        `;
        targetBody.appendChild(totalRow);
    }

    function generateExternalYearLabels(A, ancTL, B, ancTR, C, ancBR, D, ancBL) {
        const outerTargetGroup = document.getElementById('outerYearRingLayer');
        outerTargetGroup.innerHTML = '';

        // Explicit outer shell vertex parameters to map out secondary macro periods (5, 15, 25... 75)
        const mappings = [
            { val: parseToArcanaLimit(A + ancTL), cx: 223.22, cy: 311.61, offX: -22, offY: 4, tag: "5" },
            { val: parseToArcanaLimit(ancTL + B), cx: 311.61, cy: 223.22, offX: -4, offY: -16, tag: "15" },
            { val: parseToArcanaLimit(B + ancTR), cx: 488.39, cy: 223.22, offX: 4, offY: -16, tag: "25" },
            { val: parseToArcanaLimit(ancTR + C), cx: 576.78, cy: 311.61, offX: 22, offY: 4, tag: "35" },
            { val: parseToArcanaLimit(C + ancBR), cx: 576.78, cy: 488.39, offX: 22, offY: 4, tag: "45" },
            { val: parseToArcanaLimit(ancBR + D), cx: 488.39, cy: 576.78, offX: 4, offY: 20, tag: "55" },
            { val: parseToArcanaLimit(D + ancBL), cx: 311.61, cy: 576.78, offX: -4, offY: 20, tag: "65" },
            { val: parseToArcanaLimit(ancBL + A), cx: 223.22, cy: 488.39, offX: -22, offY: 4, tag: "75" }
        ];

        mappings.forEach(pt => {
            // Circle Anchor Node
            const cNode = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
            cNode.setAttribute('cx', pt.cx);
            cNode.setAttribute('cy', pt.cy);
            cNode.setAttribute('r', '11');
            cNode.setAttribute('fill', '#ffffff');
            cNode.setAttribute('stroke', '#9095A9');
            cNode.setAttribute('stroke-width', '1');
            outerTargetGroup.appendChild(cNode);

            // Arcana Digit Placement
            const tNode = document.createElementNS('http://www.w3.org/2000/svg', 'text');
            tNode.setAttribute('x', pt.cx);
            tNode.setAttribute('y', pt.cy + 4);
            tNode.setAttribute('font-size', '11');
            tNode.setAttribute('fill', '#2D3142');
            tNode.setAttribute('text-anchor', 'middle');
            tNode.textContent = pt.val;
            outerTargetGroup.appendChild(tNode);

            // Exterior Age Caption Text Tag
            const capNode = document.createElementNS('http://www.w3.org/2000/svg', 'text');
            capNode.setAttribute('x', pt.cx + pt.offX);
            capNode.setAttribute('y', pt.cy + pt.offY);
            capNode.setAttribute('font-size', '10');
            capNode.setAttribute('fill', '#9095A9');
            capNode.setAttribute('font-weight', '500');
            capNode.setAttribute('text-anchor', 'middle');
            capNode.textContent = pt.tag + " y.o.";
            outerTargetGroup.appendChild(capNode);
        });
    }

    // Immediate initial lifecycle invocation fallback
    window.onload = runDestinyCalculation;
</script>

</body>
</html>
