<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DestiMatrix - Ultimate Destiny Matrix Calculator</title>
    <style>
        :root {
            --bg-main: #fcfbfa;
            --card-bg: #ffffff;
            --text-dark: #1a1d20;
            --text-gray: #6c757d;
            --accent: #ff007f;
            --border: #e9ecef;
            --font: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;

            /* Canonical Nodes Color Map */
            --purple-main: #9b5de5;
            --blue-main: #00bbf9;
            --cyan-main: #00f5d4;
            --green-main: #00f5d4;
            --orange-main: #f15bb5;
            --red-main: #ff5400;
            --yellow-center: #fee440;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: var(--font);
            background-color: var(--bg-main);
            color: var(--text-dark);
            padding: 20px;
            display: flex;
            justify-content: center;
        }

        .container {
            width: 100%;
            max-width: 1200px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 24px;
        }

        header {
            text-align: center;
            margin: 10px 0;
        }

        header h1 {
            font-size: 2.2rem;
            font-weight: 800;
            letter-spacing: -0.03em;
            text-transform: uppercase;
        }

        header p {
            color: var(--text-gray);
            font-size: 0.95rem;
        }

        .calculator-card {
            background: var(--card-bg);
            padding: 24px;
            border-radius: 20px;
            border: 1px solid var(--border);
            width: 100%;
            max-width: 440px;
            box-shadow: 0 4px 24px rgba(0,0,0,0.02);
            text-align: center;
        }

        .input-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
            text-align: left;
            margin-bottom: 16px;
        }

        .input-group label {
            font-weight: 600;
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: var(--text-gray);
        }

        .input-group input {
            padding: 14px;
            border: 1.5px solid var(--border);
            border-radius: 12px;
            font-size: 1rem;
            outline: none;
            background-color: #f8f9fa;
            font-family: inherit;
        }

        .input-group input:focus {
            border-color: var(--text-dark);
            background-color: #fff;
        }

        .btn-calc {
            background-color: var(--text-dark);
            color: white;
            border: none;
            padding: 14px;
            font-size: 1rem;
            font-weight: 600;
            border-radius: 12px;
            cursor: pointer;
            width: 100%;
            transition: opacity 0.2s;
        }

        .btn-calc:hover {
            opacity: 0.9;
        }

        .workspace {
            display: grid;
            grid-template-columns: 1fr;
            gap: 32px;
            width: 100%;
        }

        @media (min-width: 1024px) {
            .workspace {
                grid-template-columns: 1.2fr 0.8fr;
                align-items: start;
            }
        }

        .diagram-container {
            background: var(--card-bg);
            padding: 20px;
            border-radius: 24px;
            border: 1px solid var(--border);
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: 0 4px 24px rgba(0,0,0,0.02);
        }

        svg {
            width: 100%;
            max-width: 700px;
            height: auto;
            overflow: visible;
        }

        .health-card {
            background: var(--card-bg);
            padding: 24px;
            border-radius: 24px;
            border: 1px solid var(--border);
            box-shadow: 0 4px 24px rgba(0,0,0,0.02);
        }

        .health-card h2 {
            font-size: 1.3rem;
            font-weight: 700;
            margin-bottom: 16px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.9rem;
        }

        th, td {
            padding: 12px 10px;
            border-bottom: 1px solid var(--border);
        }

        th {
            font-weight: 600;
            color: var(--text-gray);
            text-transform: uppercase;
            font-size: 0.75rem;
            letter-spacing: 0.05em;
        }

        .chakra-cell {
            display: flex;
            align-items: center;
            gap: 8px;
            font-weight: 600;
        }

        .chakra-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
        }

        tr.total-row {
            font-weight: 700;
            background-color: #f8f9fa;
        }

        /* SVG Typography & Specific Vector Element overrides */
        text {
            font-family: var(--font);
            font-weight: 700;
            user-select: none;
        }
        .age-text {
            font-size: 11px;
            fill: #6c757d;
            font-weight: 600;
        }
        .node-text {
            font-size: 14px;
            fill: #1a1d20;
            font-weight: 700;
        }
        .center-text {
            font-size: 18px;
            fill: #1a1d20;
            font-weight: 800;
        }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>DestiMatrix</h1>
        <p>Canonical 22 Arcana Destiny System</p>
    </header>

    <div class="calculator-card">
        <div class="input-group">
            <label for="birthdate">Date of Birth</label>
            <input type="date" id="birthdate" value="1994-05-28">
        </div>
        <button class="btn-calc" onclick="calculateClassicMatrix()">Calculate Matrix</button>
    </div>

    <div class="workspace">
        <div class="diagram-container">
            <svg id="matrixBoard" viewBox="0 0 800 800">
                <g id="gridGeometryLayer">
                    <circle cx="400" cy="400" r="280" stroke="#ced4da" stroke-width="1.2" fill="none" />
                    <circle cx="400" cy="400" r="170" stroke="#e9ecef" stroke-width="1" stroke-dasharray="4,4" fill="none" />

                    <path d="M 400 120 L 680 400 L 400 680 L 120 400 Z" stroke="#1a1d20" stroke-width="1.8" fill="none" />
                    
                    <path d="M 202.02 202.02 L 597.98 202.02 L 597.98 597.98 L 202.02 597.98 Z" stroke="#6c757d" stroke-width="1.2" fill="none" />

                    <line x1="120" y1="400" x2="680" y2="400" stroke="#1a1d20" stroke-width="1" />
                    <line x1="400" y1="120" x2="400" y2="680" stroke="#1a1d20" stroke-width="1" />

                    <line x1="202.02" y1="202.02" x2="597.98" y2="597.98" stroke="#adb5bd" stroke-width="1" stroke-dasharray="3,3" />
                    <line x1="597.98" y1="202.02" x2="202.02" y2="597.98" stroke="#adb5bd" stroke-width="1" stroke-dasharray="3,3" />

                    <path d="M 400 400 L 400 610 L 610 400" stroke="#1a1d20" stroke-width="1.2" fill="none" />
                    <line x1="400" y1="400" x2="540" y2="540" stroke="#6c757d" stroke-width="1" stroke-dasharray="2,2" />
                </g>

                <g id="vectorNodesLayer">
                    <circle cx="400" cy="400" r="28" fill="#fee440" stroke="#1a1d20" stroke-width="2" />
                    <text x="400" y="406" id="r_E" class="center-text" text-anchor="middle"></text>

                    <circle cx="120" cy="400" r="20" fill="#9b5de5" stroke="#1a1d20" stroke-width="2" />
                    <text x="120" y="405" id="r_A" class="node-text" fill="white" text-anchor="middle"></text>
                    <text x="85" y="404" class="age-text" text-anchor="end">0 y.o.</text>

                    <circle cx="400" cy="120" r="20" fill="#9b5de5" stroke="#1a1d20" stroke-width="2" />
                    <text x="400" y="125" id="r_B" class="node-text" fill="white" text-anchor="middle"></text>
                    <text x="400" y="90" class="age-text" text-anchor="middle">20 y.o.</text>

                    <circle cx="680" cy="400" r="20" fill="#ff5400" stroke="#1a1d20" stroke-width="2" />
                    <text x="680" y="405" id="r_C" class="node-text" fill="white" text-anchor="middle"></text>
                    <text x="715" y="404" class="age-text" text-anchor="start">40 y.o.</text>

                    <circle cx="400" cy="680" r="20" fill="#ff5400" stroke="#1a1d20" stroke-width="2" />
                    <text x="400" y="685" id="r_D" class="node-text" fill="white" text-anchor="middle"></text>
                    <text x="400" y="715" class="age-text" text-anchor="middle">60 y.o.</text>

                    <circle cx="202.02" cy="202.02" r="16" fill="#ffffff" stroke="#6c757d" stroke-width="1.5" />
                    <text x="202.02" y="206" id="r_anc_tl" font-size="12" text-anchor="middle"></text>
                    <text x="180" y="185" class="age-text" text-anchor="end">10 y.o.</text>

                    <circle cx="597.98" cy="202.02" r="16" fill="#ffffff" stroke="#6c757d" stroke-width="1.5" />
                    <text x="597.98" y="206" id="r_anc_tr" font-size="12" text-anchor="middle"></text>
                    <text x="620" y="185" class="age-text" text-anchor="start">30 y.o.</text>

                    <circle cx="597.98" cy="597.98" r="16" fill="#ffffff" stroke="#6c757d" stroke-width="1.5" />
                    <text x="597.98" y="602" id="r_anc_br" font-size="12" text-anchor="middle"></text>
                    <text x="620" y="620" class="age-text" text-anchor="start">50 y.o.</text>

                    <circle cx="202.02" cy="597.98" r="16" fill="#ffffff" stroke="#6c757d" stroke-width="1.5" />
                    <text x="202.02" y="602" id="r_anc_bl" font-size="12" text-anchor="middle"></text>
                    <text x="180" y="620" class="age-text" text-anchor="end">70 y.o.</text>

                    <circle cx="400" cy="190" r="13" fill="#ffffff" stroke="#00bbf9" stroke-width="1.5" />
                    <text x="400" y="194" id="r_ch_ajna" font-size="11" text-anchor="middle"></text>

                    <circle cx="400" cy="260" r="13" fill="#ffffff" stroke="#00f5d4" stroke-width="1.5" />
                    <text x="400" y="264" id="r_ch_vissudha" font-size="11" text-anchor="middle"></text>

                    <circle cx="400" cy="330" r="13" fill="#ffffff" stroke="#00f5d4" stroke-width="1.5" />
                    <text x="400" y="334" id="r_ch_anahata" font-size="11" text-anchor="middle"></text>

                    <circle cx="400" cy="540" r="13" fill="#ffffff" stroke="#f15bb5" stroke-width="1.5" />
                    <text x="400" y="544" id="r_ch_svadhisthana" font-size="11" text-anchor="middle"></text>

                    <circle cx="400" cy="610" r="13" fill="#ffffff" stroke="#ff5400" stroke-width="1.5" />
                    <text x="400" y="614" id="r_ch_muladhara_in" font-size="11" text-anchor="middle"></text>

                    <circle cx="540" cy="400" r="13" fill="#ffffff" stroke="#00f5d4" stroke-width="1.5" />
                    <text x="540" y="404" id="r_ch_money_ent" font-size="11" text-anchor="middle"></text>

                    <circle cx="610" cy="400" r="13" fill="#ffffff" stroke="#ff5400" stroke-width="1.5" />
                    <text x="610" y="404" id="r_ch_money_mid" font-size="11" text-anchor="middle"></text>

                    <circle cx="495" cy="495" r="14" fill="#ffffff" stroke="#1a1d20" stroke-width="1.5" />
                    <text x="495" y="499" id="r_ch_well_bal" font-size="11" text-anchor="middle"></text>

                    <circle cx="530" cy="455" r="12" fill="#e8f5e9" stroke="#00f5d4" stroke-width="1" />
                    <text x="530" y="459" id="r_ch_prof" font-size="10" text-anchor="middle"></text>
                    <text x="548" y="450" fill="#2e7d32" font-size="11" font-weight="bold">$</text>

                    <circle cx="455" cy="530" r="12" fill="#fce4ec" stroke="#f15bb5" stroke-width="1" />
                    <text x="455" y="534" id="r_ch_partner" font-size="10" text-anchor="middle"></text>
                    <text x="435" y="545" fill="#c2185b" font-size="11" font-weight="bold">❤️</text>
                </g>

                <g id="outerYearMicroLayer"></g>
            </svg>
        </div>

        <div class="health-card">
            <h2>Health Card Spec</h2>
            <table>
                <thead>
                    <tr>
                        <th>Chakra Spectrum Name</th>
                        <th>Physics (P)</th>
                        <th>Energy (E)</th>
                        <th>Emotions (Em)</th>
                    </tr>
                </thead>
                <tbody id="healthSheetContainer">
                    </tbody>
            </table>
        </div>
    </div>
</div>

<script>
    // Pure 22 Matrix Base Reducer Helper Function
    function strictReduceTo22Limit(numValue) {
        if (numValue <= 0) return 22;
        while (numValue > 22) {
            numValue = String(numValue).split('').reduce((acc, currentDigit) => acc + parseInt(currentDigit, 10), 0);
        }
        return numValue;
    }

    function calculateClassicMatrix() {
        const structuralDateValue = document.getElementById('birthdate').value;
        if (!structuralDateValue) return;

        const dateParts = new Date(structuralDateValue);
        const parsedDay = dateParts.getDate();
        const parsedMonth = dateParts.getMonth() + 1;
        const parsedYear = dateParts.getFullYear();

        // Major Axis Formulations Calculations
        const A = strictReduceTo22Limit(parsedDay);
        const B = strictReduceTo22Limit(parsedMonth);
        const C = strictReduceTo22Limit(parsedYear);
        const D = strictReduceTo22Limit(A + B + C);
        const E = strictReduceTo22Limit(A + B + C + D);

        // Map Base Nodes Values
        document.getElementById('r_A').textContent = A;
        document.getElementById('r_B').textContent = B;
        document.getElementById('r_C').textContent = C;
        document.getElementById('r_D').textContent = D;
        document.getElementById('r_E').textContent = E;

        // Ancestral Family Structural Calculations
        const ancTL = strictReduceTo22Limit(A + B);
        const ancTR = strictReduceTo22Limit(B + C);
        const ancBR = strictReduceTo22Limit(C + D);
        const ancBL = strictReduceTo22Limit(D + A);

        document.getElementById('r_anc_tl').textContent = ancTL;
        document.getElementById('r_anc_tr').textContent = ancTR;
        document.getElementById('r_anc_br').textContent = ancBR;
        document.getElementById('r_anc_bl').textContent = ancBL;

        // Core Chakra Channel Alignment Map Formulas
        const ajna = strictReduceTo22Limit(B + E);
        const vissudha = strictReduceTo22Limit(B + ajna);
        const anahata = strictReduceTo22Limit(E + vissudha);
        const svadhisthana = strictReduceTo22Limit(D + E);
        const muladhara_in = strictReduceTo22Limit(D + svadhisthana);

        document.getElementById('r_ch_ajna').textContent = ajna;
        document.getElementById('r_ch_vissudha').textContent = vissudha;
        document.getElementById('r_ch_anahata').textContent = anahata;
        document.getElementById('r_ch_svadhisthana').textContent = svadhisthana;
        document.getElementById('r_ch_muladhara_in').textContent = muladhara_in;

        // Wealth Generation Flow & Love Paths
        const money_ent = strictReduceTo22Limit(C + E);
        const money_mid = strictReduceTo22Limit(C + money_ent);
        const well_bal = strictReduceTo22Limit(money_ent + svadhisthana);
        const prof = strictReduceTo22Limit(money_ent + well_bal);
        const partner = strictReduceTo22Limit(svadhisthana + well_bal);

        document.getElementById('r_ch_money_ent').textContent = money_ent;
        document.getElementById('r_ch_money_mid').textContent = money_mid;
        document.getElementById('r_ch_well_bal').textContent = well_bal;
        document.getElementById('r_ch_prof').textContent = prof;
        document.getElementById('r_ch_partner').textContent = partner;

        // Render Reactive Health Card Components
        buildHealthDataCardSpec(A, B, C, D, E, ajna, vissudha, anahata, svadhisthana, muladhara_in);

        // Generate Exterior Shell Perimeter Floating Micro Year Elements
        injectMicroYearCircleNodes(A, ancTL, B, ancTR, C, ancBR, D, ancBL);
    }

    function buildHealthDataCardSpec(A, B, C, D, E, ajna, vissudha, anahata, svadhisthana, muladhara_in) {
        const matrixSchema = [
            { title: "Sahasrara", fill: "var(--purple-main)", p: B, e: B, em: strictReduceTo22Limit(B + B) },
            { title: "Ajna", fill: "var(--blue-main)", p: strictReduceTo22Limit(A + B), e: ajna, em: strictReduceTo22Limit(strictReduceTo22Limit(A + B) + ajna) },
            { title: "Vissudha", fill: "var(--cyan-main)", p: strictReduceTo22Limit(A + C), e: vissudha, em: strictReduceTo22Limit(strictReduceTo22Limit(A + C) + vissudha) },
            { title: "Anahata", fill: "var(--green-main)", p: strictReduceTo22Limit(A + D), e: anahata, em: strictReduceTo22Limit(strictReduceTo22Limit(A + D) + anahata) },
            { title: "Manipura", fill: "var(--yellow-center)", p: E, e: strictReduceTo22Limit(A + E), em: strictReduceTo22Limit(E + strictReduceTo22Limit(A + E)) },
            { title: "Svadhisthana", fill: "var(--orange-main)", p: strictReduceTo22Limit(C + D), e: svadhisthana, em: strictReduceTo22Limit(strictReduceTo22Limit(C + D) + svadhisthana) },
            { title: "Muladhara", fill: "var(--red-main)", p: A, e: muladhara_in, em: strictReduceTo22Limit(A + muladhara_in) }
        ];

        let summaryP = 0, summaryE = 0, summaryEm = 0;
        const targetElementBody = document.getElementById('healthSheetContainer');
        targetElementBody.innerHTML = '';

        matrixSchema.forEach(rowItem => {
            summaryP += rowItem.p;
            summaryE += rowItem.e;
            summaryEm += rowItem.em;

            const tableRowNode = document.createElement('tr');
            tableRowNode.innerHTML = `
                <td><div class="chakra-cell"><span class="chakra-dot" style="background-color: ${rowItem.fill}"></span>${rowItem.title}</div></td>
                <td>${rowItem.p}</td>
                <td>${rowItem.e}</td>
                <td>${rowItem.em}</td>
            `;
            targetElementBody.appendChild(tableRowNode);
        });

        const totalRowNode = document.createElement('tr');
        totalRowNode.className = 'total-row';
        totalRowNode.innerHTML = `
            <td>Total Result</td>
            <td>${strictReduceTo22Limit(summaryP)}</td>
            <td>${strictReduceTo22Limit(summaryE)}</td>
            <td>${strictReduceTo22Limit(summaryEm)}</td>
        `;
        targetElementBody.appendChild(totalRowNode);
    }

    function injectMicroYearCircleNodes(A, ancTL, B, ancTR, C, ancBR, D, ancBL) {
        const outerShellLayer = document.getElementById('outerYearMicroLayer');
        outerShellLayer.innerHTML = '';

        // Perfect trigonometric outer perimeter mapping coordinates (Center 400, 400, Radius 280)
        // Calculated sequentially for 5, 15, 25, 35, 45, 55, 65, 75 micro periods
        const outerPillarsData = [
            { value: strictReduceTo22Limit(A + ancTL), cx: 202.02, cy: 317.98, age: "5" },
            { value: strictReduceTo22Limit(ancTL + B), cx: 317.98, cy: 202.02, age: "15" },
            { value: strictReduceTo22Limit(B + ancTR), cx: 482.02, cy: 202.02, age: "25" },
            { value: strictReduceTo22Limit(ancTR + C), cx: 597.98, cy: 317.98, age: "35" },
            { value: strictReduceTo22Limit(C + ancBR), cx: 597.98, cy: 482.02, age: "45" },
            { value: strictReduceTo22Limit(ancBR + D), cx: 482.02, cy: 597.98, age: "55" },
            { value: strictReduceTo22Limit(D + ancBL), cx: 317.98, cy: 597.98, age: "65" },
            { value: strictReduceTo22Limit(ancBL + A), cx: 202.02, cy: 482.02, age: "75" }
        ];

        outerPillarsData.forEach(itemNode => {
            // Circle Node Component
            const circleNode = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
            circleNode.setAttribute('cx', itemNode.cx);
            circleNode.setAttribute('cy', itemNode.cy);
            circleNode.setAttribute('r', '10');
            circleNode.setAttribute('fill', '#ffffff');
            circleNode.setAttribute('stroke', '#6c757d');
            circleNode.setAttribute('stroke-width', '1');
            outerShellLayer.appendChild(circleNode);

            // Inner Arcana Text Inside Node
            const textNode = document.createElementNS('http://www.w3.org/2000/svg', 'text');
            textNode.setAttribute('x', itemNode.cx);
            textNode.setAttribute('y', itemNode.cy + 4);
            textNode.setAttribute('font-size', '10');
            textNode.setAttribute('fill', '#1a1d20');
            textNode.setAttribute('text-anchor', 'middle');
            textNode.textContent = itemNode.value;
            outerShellLayer.appendChild(textNode);

            // Outer Age Description Marker Label Placement
            const labelNode = document.createElementNS('http://www.w3.org/2000/svg', 'text');
            
            // Smart layout offsets to push texts safely outside the geometric perimeter ring
            let offsetX = 0, offsetY = 0;
            if (itemNode.cx < 400) offsetX = -22;
            else offsetX = 22;
            if (itemNode.cy < 400) offsetY = -12;
            else offsetY = 16;

            labelNode.setAttribute('x', itemNode.cx + offsetX);
            labelNode.setAttribute('y', itemNode.cy + offsetY);
            labelNode.setAttribute('font-size', '10');
            labelNode.setAttribute('fill', '#6c757d');
            labelNode.setAttribute('font-weight', '500');
            labelNode.setAttribute('text-anchor', 'middle');
            labelNode.textContent = itemNode.age + " y.o.";
            outerShellLayer.appendChild(labelNode);
        });
    }

    // Initialize layout stack execution lifecycle hook
    window.onload = calculateClassicMatrix;
</script>

</body>
</html>
