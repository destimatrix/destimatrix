<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DestiMatrix Calculator</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #f6f2ec;
  color: #1f2937;
}

.wrapper {
  max-width: 1250px;
  margin: 0 auto;
  padding: 24px;
}

h1 {
  text-align: center;
  font-size: 34px;
  margin-bottom: 20px;
}

.form {
  display: flex;
  justify-content: center;
  gap: 12px;
  margin-bottom: 30px;
  flex-wrap: wrap;
}

input, button {
  padding: 14px 18px;
  border-radius: 12px;
  border: 1px solid #d1d5db;
  font-size: 18px;
}

button {
  background: #7c3aed;
  color: white;
  border: none;
  cursor: pointer;
  font-weight: bold;
}

.layout {
  display: grid;
  grid-template-columns: 360px 1fr;
  gap: 30px;
  align-items: start;
}

.panel {
  background: white;
  border-radius: 18px;
  padding: 18px;
  box-shadow: 0 10px 30px rgba(0,0,0,0.08);
}

h2 {
  margin-top: 0;
}

table {
  width: 100%;
  border-collapse: collapse;
  font-size: 13px;
}

th, td {
  padding: 10px;
  text-align: center;
  border-bottom: 1px solid #e5e7eb;
}

th:first-child, td:first-child {
  text-align: left;
}

.chakra {
  color: white;
  font-weight: bold;
  width: 28px;
}

.c1 { background:#8b5cf6; }
.c2 { background:#6366f1; }
.c3 { background:#06b6d4; }
.c4 { background:#84cc16; }
.c5 { background:#eab308; }
.c6 { background:#f97316; }
.c7 { background:#ef4444; }
.c8 { background:#9ca3af; }

.lines {
  margin-top: 20px;
  font-size: 15px;
}

.line-row {
  display: flex;
  justify-content: space-between;
  margin: 10px 0;
}

.mini-circles span {
  display: inline-flex;
  width: 34px;
  height: 34px;
  border: 2px solid #9ca3af;
  border-radius: 50%;
  align-items: center;
  justify-content: center;
  margin-left: 6px;
  background: white;
}

.chart-panel {
  background: white;
  border-radius: 18px;
  padding: 18px;
  box-shadow: 0 10px 30px rgba(0,0,0,0.08);
}

svg {
  width: 100%;
  height: auto;
}

.circle-text {
  font-size: 20px;
  font-weight: bold;
  text-anchor: middle;
  dominant-baseline: middle;
}

.small-text {
  font-size: 10px;
  fill: #374151;
  text-anchor: middle;
}

.line-label {
  font-size: 12px;
  fill: #6b7280;
}

.mission-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 14px;
  margin-top: 20px;
}

.mission-box {
  background: white;
  border-radius: 16px;
  padding: 16px;
  box-shadow: 0 10px 30px rgba(0,0,0,0.08);
}

.mission-box h3 {
  margin: 0 0 8px;
  font-size: 15px;
}

@media (max-width: 900px) {
  .layout {
    grid-template-columns: 1fr;
  }
}
</style>
</head>

<body>

<div class="wrapper">

<h1 id="title">DestiMatrix Chart</h1>

<div class="form">
  <input type="date" id="birthdate" value="1994-05-28">
  <button onclick="calculateMatrix()">Calculate My Matrix</button>
</div>

<div class="layout">

  <div class="panel">
    <h2>Personal calculation</h2>
    <h3>Health card</h3>

    <table>
      <thead>
        <tr>
          <th></th>
          <th>Chakra name</th>
          <th>Physics</th>
          <th>Energy</th>
          <th>Emotions</th>
        </tr>
      </thead>
      <tbody id="healthTable"></tbody>
    </table>

    <div class="lines">
      <div class="line-row">
        <b>Male generation lines:</b>
        <div class="mini-circles" id="maleLine"></div>
      </div>
      <div class="line-row">
        <b>Female generation lines:</b>
        <div class="mini-circles" id="femaleLine"></div>
      </div>
    </div>
  </div>

  <div class="chart-panel">
    <svg viewBox="0 0 700 620">

      <polygon points="350,50 570,160 650,310 570,460 350,570 130,460 50,310 130,160"
        fill="none" stroke="#111827" stroke-width="2"/>

      <polygon points="350,50 650,310 350,570 50,310"
        fill="none" stroke="#111827" stroke-width="2"/>

      <polygon points="130,160 570,160 570,460 130,460"
        fill="none" stroke="#111827" stroke-width="2"/>

      <line x1="350" y1="50" x2="350" y2="570" stroke="#111827" stroke-width="1.5"/>
      <line x1="50" y1="310" x2="650" y2="310" stroke="#111827" stroke-width="1.5"/>

      <line x1="130" y1="160" x2="570" y2="460" stroke="#7c3aed" stroke-width="2"/>
      <line x1="570" y1="160" x2="130" y2="460" stroke="#ef4444" stroke-width="2"/>

      <text x="265" y="235" class="line-label" transform="rotate(34 265 235)">male generation line</text>
      <text x="430" y="235" class="line-label" transform="rotate(-34 430 235)">female generation line</text>

      <line x1="350" y1="310" x2="500" y2="390" stroke="#9ca3af" stroke-dasharray="6 6"/>
      <text x="440" y="345" font-size="22" fill="#65a30d">$</text>
      <text x="330" y="410" font-size="24" fill="#ef4444">❤</text>

      <g id="circles"></g>
    </svg>
  </div>

</div>

<div class="mission-grid">
  <div class="mission-box">
    <h3>Soul searching</h3>
    <p>Sky: <b id="sky"></b></p>
    <p>Earth: <b id="earth"></b></p>
    <p>First mission: <b id="firstMission"></b></p>
  </div>

  <div class="mission-box">
    <h3>Socialization</h3>
    <p>M: <b id="missionM"></b></p>
    <p>F: <b id="missionF"></b></p>
    <p>Second mission: <b id="secondMission"></b></p>
  </div>

  <div class="mission-box">
    <h3>Spiritual knowledge</h3>
    <p>Third mission: <b id="thirdMission"></b></p>
  </div>
</div>

</div>

<script>
function reduceArcana(number) {
  while (number > 22) {
    number = String(number).split('').reduce((sum, digit) => sum + Number(digit), 0);
  }
  return number;
}

function createCircle(x, y, r, value, fill, stroke = '#111827', textColor = 'white') {
  return `
    <circle cx="${x}" cy="${y}" r="${r}" fill="${fill}" stroke="${stroke}" stroke-width="2"/>
    <text x="${x}" y="${y}" class="circle-text" fill="${textColor}">${value}</text>
  `;
}

function calculateMatrix() {
  const birthdate = document.getElementById('birthdate').value;
  if (!birthdate) {
    alert('Please enter your date of birth.');
    return;
  }

  const [yearFull, monthString, dayString] = birthdate.split('-');
  const dayRaw = Number(dayString);
  const monthRaw = Number(monthString);

  const day = reduceArcana(dayRaw);
  const month = reduceArcana(monthRaw);
  const year = reduceArcana(String(yearFull).split('').reduce((s,d) => s + Number(d), 0));

  const karmicTail = reduceArcana(day + month + year);
  const center = reduceArcana(day + month + year + karmicTail);

  const portrait2 = reduceArcana(day + center);
  const portrait3 = reduceArcana(day + portrait2);

  const talent2 = reduceArcana(month + center);
  const talent3 = reduceArcana(month + talent2);

  const heart1 = reduceArcana(portrait2 + center);
  const heart2 = reduceArcana(talent2 + center);

  const material2 = reduceArcana(year + center);
  const material3 = reduceArcana(year + material2);

  const spiritual2 = reduceArcana(karmicTail + center);
  const spiritual3 = reduceArcana(karmicTail + spiritual2);

  const balance = reduceArcana(material2 + spiritual2);
  const money = reduceArcana(material2 + balance);
  const love = reduceArcana(spiritual2 + balance);

  const A = reduceArcana(day + month);
  const B = reduceArcana(month + year);
  const C = reduceArcana(year + karmicTail);
  const D = reduceArcana(karmicTail + day);

  const maleSum = reduceArcana(A + C);
  const femaleSum = reduceArcana(B + D);

  const sky = reduceArcana(month + karmicTail);
  const earth = reduceArcana(day + year);
  const firstMission = reduceArcana(sky + earth);

  const secondMission = reduceArcana(maleSum + femaleSum);
  const thirdMission = reduceArcana(firstMission + secondMission);

  document.getElementById('title').innerText =
    `Diagram: DestiMatrix (${dayString}.${monthString}.${yearFull})`;

  const circles = `
    ${createCircle(350, 50, 42, month, '#7c3aed')}
    ${createCircle(650, 310, 42, year, '#ef4444')}
    ${createCircle(350, 570, 42, karmicTail, '#ef4444')}
    ${createCircle(50, 310, 42, day, '#7c3aed')}

    ${createCircle(350, 310, 36, center, '#facc15', '#facc15', '#111827')}

    ${createCircle(350, 115, 22, talent3, '#6366f1')}
    ${createCircle(350, 155, 18, talent2, '#06b6d4')}
    ${createCircle(350, 225, 18, heart2, '#84cc16')}

    ${createCircle(120, 310, 24, portrait3, '#6366f1')}
    ${createCircle(175, 310, 20, portrait2, '#06b6d4')}
    ${createCircle(265, 310, 18, heart1, '#84cc16')}

    ${createCircle(585, 310, 22, material2, '#f59e0b')}
    ${createCircle(530, 310, 20, material3, 'white', '#111827', '#111827')}
    ${createCircle(470, 310, 18, money, 'white', '#111827', '#111827')}

    ${createCircle(350, 510, 22, spiritual3, 'white', '#111827', '#111827')}
    ${createCircle(350, 455, 20, spiritual2, '#f59e0b')}
    ${createCircle(350, 395, 18, balance, 'white', '#111827', '#111827')}
    ${createCircle(410, 395, 18, love, 'white', '#111827', '#111827')}

    ${createCircle(130, 160, 34, A, 'white', '#111827', '#111827')}
    ${createCircle(570, 160, 34, B, 'white', '#111827', '#111827')}
    ${createCircle(570, 460, 34, C, 'white', '#111827', '#111827')}
    ${createCircle(130, 460, 34, D, 'white', '#111827', '#111827')}

    ${createCircle(210, 205, 22, maleSum, 'white', '#111827', '#111827')}
    ${createCircle(500, 205, 22, femaleSum, 'white', '#111827', '#111827')}

    ${createCircle(510, 410, 20, maleSum, 'white', '#111827', '#111827')}
    ${createCircle(525, 455, 20, secondMission, 'white', '#111827', '#111827')}
  `;

  document.getElementById('circles').innerHTML = circles;

  const healthRows = [
    ['c1', '1', 'Sahasrara<br><small>Mission</small>', day, month, reduceArcana(day + month)],
    ['c2', '2', 'Ajna<br><small>Destiny, egregores</small>', portrait3, talent3, reduceArcana(portrait3 + talent3)],
    ['c3', '3', 'Vishuddha<br><small>Destiny, egregores</small>', portrait2, talent2, reduceArcana(portrait2 + talent2)],
    ['c4', '4', 'Anahata<br><small>Relationships, picture of the world</small>', heart1, heart2, reduceArcana(heart1 + heart2)],
    ['c5', '5', 'Manipura<br><small>Status, possessions</small>', center, center, reduceArcana(center + center)],
    ['c6', '6', 'Svadhisthana<br><small>Love of children, Joy</small>', material2, spiritual2, reduceArcana(material2 + spiritual2)],
    ['c7', '7', 'Muladhara<br><small>Body, materia</small>', year, karmicTail, reduceArcana(year + karmicTail)]
  ];

  const physicsSum = reduceArcana(healthRows.reduce((s,r) => s + r[3], 0));
  const energySum = reduceArcana(healthRows.reduce((s,r) => s + r[4], 0));
  const emotionsSum = reduceArcana(healthRows.reduce((s,r) => s + r[5], 0));

  let tableHTML = '';
  healthRows.forEach(row => {
    tableHTML += `
      <tr>
        <td class="chakra ${row[0]}">${row[1]}</td>
        <td>${row[2]}</td>
        <td>${row[3]}</td>
        <td>${row[4]}</td>
        <td>${row[5]}</td>
      </tr>
    `;
  });

  tableHTML += `
    <tr>
      <td class="chakra c8"></td>
      <td><b>Result</b><br><small>Common energy-zone</small></td>
      <td><b>${physicsSum}</b></td>
      <td><b>${energySum}</b></td>
      <td><b>${emotionsSum}</b></td>
    </tr>
  `;

  document.getElementById('healthTable').innerHTML = tableHTML;

  document.getElementById('maleLine').innerHTML =
    `<span>${A}</span><span>${C}</span><span>${maleSum}</span>`;

  document.getElementById('femaleLine').innerHTML =
    `<span>${B}</span><span>${D}</span><span>${femaleSum}</span>`;

  document.getElementById('sky').innerText = sky;
  document.getElementById('earth').innerText = earth;
  document.getElementById('firstMission').innerText = firstMission;

  document.getElementById('missionM').innerText = maleSum;
  document.getElementById('missionF').innerText = femaleSum;
  document.getElementById('secondMission').innerText = secondMission;

  document.getElementById('thirdMission').innerText = thirdMission;
}

calculateMatrix();
</script>

</body>
</html>
