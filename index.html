<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DestiMatrix Calculator</title>

  <style>
    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #ffffff;
      color: #222;
    }

    .page {
      max-width: 1180px;
      margin: 0 auto;
      padding: 28px 16px 60px;
    }

    h1 {
      text-align: center;
      font-size: 32px;
      margin: 0 0 28px;
      font-weight: 700;
    }

    .form {
      max-width: 420px;
      margin: 0 auto 30px;
      display: flex;
      gap: 10px;
      justify-content: center;
    }

    input {
      height: 42px;
      padding: 0 12px;
      font-size: 16px;
      border: 1px solid #cfcfcf;
      border-radius: 4px;
    }

    button {
      height: 42px;
      padding: 0 18px;
      font-size: 15px;
      font-weight: 700;
      background: #222831;
      color: #fff;
      border: none;
      border-radius: 4px;
      cursor: pointer;
    }

    .result {
      display: none;
    }

    .main-grid {
      display: grid;
      grid-template-columns: 330px 1fr;
      gap: 30px;
      align-items: start;
    }

    .left-column h2 {
      font-size: 22px;
      margin: 0 0 8px;
    }

    .left-column h3 {
      font-size: 16px;
      margin: 0 0 16px;
    }

    .health-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 13px;
      margin-bottom: 24px;
    }

    .health-table th,
    .health-table td {
      padding: 10px;
      border-bottom: 1px solid #e6e6e6;
      text-align: center;
    }

    .health-table th:first-child,
    .health-table td:first-child {
      text-align: left;
      font-weight: 700;
    }

    .chakra-color {
      width: 28px;
      color: #fff;
      font-weight: 700;
      text-align: center !important;
    }

    .violet { background: #8e44ad; }
    .indigo { background: #4b6cff; }
    .blue { background: #45cfe1; }
    .green { background: #9be564; color: #222; }
    .yellow { background: #ffed47; color: #222; }
    .orange { background: #f6a23a; }
    .red { background: #ef4141; }

    .info-block {
      margin-bottom: 22px;
      font-size: 13px;
      line-height: 1.45;
    }

    .info-title {
      font-weight: 700;
      margin-bottom: 8px;
    }

    .small-circles {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
      margin-top: 6px;
    }

    .mini-circle {
      width: 28px;
      height: 28px;
      border: 1.5px solid #999;
      border-radius: 50%;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-weight: 700;
      font-size: 13px;
    }

    .matrix-wrap {
      width: 100%;
      overflow-x: auto;
    }

    svg {
      display: block;
      width: 100%;
      min-width: 650px;
      height: auto;
    }

    .line {
      stroke: #222831;
      stroke-width: 2;
      fill: none;
    }

    .thin-line {
      stroke: #222831;
      stroke-width: 1.3;
      fill: none;
      opacity: .8;
    }

    .male-line {
      stroke: #9b6bd3;
      stroke-width: 2;
      fill: none;
    }

    .female-line {
      stroke: #ef5a8a;
      stroke-width: 2;
      fill: none;
    }

    .dashed-line {
      stroke: #999;
      stroke-width: 1.4;
      stroke-dasharray: 5 5;
      fill: none;
    }

    .circle {
      stroke: #fff;
      stroke-width: 5;
      filter: drop-shadow(0 4px 8px rgba(0,0,0,.12));
    }

    .circle-border {
      stroke: #222831;
      stroke-width: 1.5;
      fill: #fff;
    }

    .num {
      font-size: 24px;
      font-weight: 700;
      text-anchor: middle;
      dominant-baseline: middle;
      fill: #222;
    }

    .big-num {
      font-size: 34px;
      font-weight: 700;
      text-anchor: middle;
      dominant-baseline: middle;
      fill: #222;
    }

    .small-num {
      font-size: 14px;
      font-weight: 700;
      text-anchor: middle;
      dominant-baseline: middle;
      fill: #222;
    }

    .tiny {
      font-size: 7px;
      font-weight: 600;
      text-anchor: middle;
      dominant-baseline: middle;
      fill: #222;
    }

    .age-main {
      font-size: 8px;
      font-weight: 700;
      text-anchor: middle;
      fill: #222;
    }

    .age-small {
      font-size: 5.5px;
      font-weight: 500;
      text-anchor: middle;
      fill: #222;
    }

    .label {
      font-size: 9px;
      font-style: italic;
      fill: #222;
    }

    .money {
      font-size: 20px;
      fill: #75bf43;
      font-weight: 700;
    }

    .heart {
      font-size: 20px;
      fill: #ef4141;
      font-weight: 700;
    }

    @media (max-width: 900px) {
      .main-grid {
        grid-template-columns: 1fr;
      }

      .left-column {
        order: 2;
      }

      .right-column {
        order: 1;
      }

      .form {
        flex-direction: column;
      }

      input, button {
        width: 100%;
      }
    }
  </style>
</head>

<body>
  <main class="page">
    <h1 id="title">DestiMatrix Calculator</h1>

    <div class="form">
      <input id="birthDate" type="date" />
      <button id="calculateBtn">Calculate</button>
    </div>

    <section class="result" id="result">
      <div class="main-grid">
        <aside class="left-column">
          <h2>Personal calculation</h2>
          <h3>Health card</h3>
          <div id="healthCard"></div>

          <div class="info-block">
            <div class="info-title">Male generation lines:</div>
            <div class="small-circles" id="maleLines"></div>
          </div>

          <div class="info-block">
            <div class="info-title">Female generation lines:</div>
            <div class="small-circles" id="femaleLines"></div>
          </div>

          <div class="info-block">
            <div class="info-title">Programs</div>
            <div id="programs"></div>
          </div>

          <div class="info-block">
            <div class="info-title">Purposes</div>
            <div id="purposes"></div>
          </div>
        </aside>

        <section class="right-column">
          <div class="matrix-wrap">
            <svg id="matrixSvg" viewBox="0 0 760 620"></svg>
          </div>
        </section>
      </div>
    </section>
  </main>

  <script>
    const svg = document.getElementById("matrixSvg");
    const result = document.getElementById("result");
    const healthCard = document.getElementById("healthCard");
    const maleLines = document.getElementById("maleLines");
    const femaleLines = document.getElementById("femaleLines");
    const programs = document.getElementById("programs");
    const purposes = document.getElementById("purposes");

    const NS = "http://www.w3.org/2000/svg";

    const colors = {
      violet: "#9270e8",
      red: "#ef4f6f",
      yellow: "#f5df3f",
      blue: "#45aee8",
      lightBlue: "#a7dff6",
      green: "#97d85c",
      orange: "#f6a23a",
      white: "#ffffff"
    };

    function reduce22(value) {
      let n = Math.abs(Number(value));
      while (n > 22) {
        n = String(n).split("").reduce((sum, digit) => sum + Number(digit), 0);
      }
      return n === 0 ? 22 : n;
    }

    function add22(...values) {
      return reduce22(values.reduce((sum, value) => sum + Number(value), 0));
    }

    function calculateMatrix(dateValue) {
      const [year, month, day] = dateValue.split("-").map(Number);

      const D = reduce22(day);
      const M = reduce22(month);
      const Y = reduce22(String(year).split("").reduce((s, d) => s + Number(d), 0));
      const tail = add22(D, M, Y);
      const center = add22(D, M, Y, tail);

      const A1 = add22(D, M);
      const B1 = add22(M, Y);
      const C1 = add22(Y, tail);
      const D1 = add22(tail, D);

      const male1 = add22(A1, center);
      const male2 = add22(C1, center);
      const male3 = add22(male1, male2);

      const female1 = add22(B1, center);
      const female2 = add22(D1, center);
      const female3 = add22(female1, female2);

      const portrait2 = add22(D, center);
      const portrait3 = add22(D, portrait2);

      const talent2 = add22(M, center);
      const talent3 = add22(M, talent2);

      const material2 = add22(Y, center);
      const material3 = add22(Y, material2);

      const karmic2 = add22(tail, center);
      const karmic3 = add22(tail, karmic2);

      const money = add22(material2, material3);
      const love = add22(karmic2, karmic3);
      const relationship = add22(love, center);
      const finance = add22(money, center);

      const sky = add22(M, tail);
      const earth = add22(D, Y);
      const personalPurpose = add22(sky, earth);

      const socialM = add22(D, M, center);
      const socialF = add22(Y, tail, center);
      const socialPurpose = add22(socialM, socialF);

      const spiritualPurpose = add22(personalPurpose, socialPurpose);

      return {
        D, M, Y, tail, center,
        A1, B1, C1, D1,
        male1, male2, male3,
        female1, female2, female3,
        portrait2, portrait3,
        talent2, talent3,
        material2, material3,
        karmic2, karmic3,
        money, love, relationship, finance,
        sky, earth, personalPurpose,
        socialM, socialF, socialPurpose,
        spiritualPurpose
      };
    }

    function el(name, attrs = {}) {
      const node = document.createElementNS(NS, name);
      Object.entries(attrs).forEach(([key, value]) => node.setAttribute(key, value));
      return node;
    }

    function line(x1, y1, x2, y2, cls = "line") {
      svg.appendChild(el("line", { x1, y1, x2, y2, class: cls }));
    }

    function polygon(points, cls = "line") {
      svg.appendChild(el("polygon", {
        points: points.map(p => `${p.x},${p.y}`).join(" "),
        class: cls
      }));
    }

    function text(x, y, value, cls = "small-num") {
      const t = el("text", { x, y, class: cls });
      t.textContent = value;
      svg.appendChild(t);
    }

    function circle(x, y, value, fill, r = 20, cls = "num") {
      svg.appendChild(el("circle", { cx: x, cy: y, r, fill, class: "circle" }));
      text(x, y + 1, value, cls);
    }

    function borderCircle(x, y, value, r = 18) {
      svg.appendChild(el("circle", { cx: x, cy: y, r, class: "circle-border" }));
      text(x, y + 1, value, "small-num");
    }

    function sidePoints(a, b, count) {
      const arr = [];
      for (let i = 0; i <= count; i++) {
        arr.push({
          x: a.x + (b.x - a.x) * (i / count),
          y: a.y + (b.y - a.y) * (i / count)
        });
      }
      return arr;
    }

    function moveFromCenter(p, cx, cy, amount) {
      const dx = p.x - cx;
      const dy = p.y - cy;
      const len = Math.sqrt(dx * dx + dy * dy);
      return {
        x: p.x + (dx / len) * amount,
        y: p.y + (dy / len) * amount
      };
    }

    function moveToCenter(p, cx, cy, amount) {
      return moveFromCenter(p, cx, cy, -amount);
    }

    function yearlyValues(m) {
      const anchors = [m.D, m.A1, m.M, m.B1, m.Y, m.C1, m.tail, m.D1];
      const result = [];

      for (let i = 0; i < anchors.length; i++) {
        const start = anchors[i];
        const end = anchors[(i + 1) % anchors.length];
        result.push(start);
        result.push(add22(start, end));
        result.push(add22(start, add22(start, end)));
        result.push(add22(add22(start, end), end));
        result.push(end);
      }

      return result;
    }

    function drawMatrix(m) {
      svg.innerHTML = "";

      const cx = 430;
      const cy = 300;

      const p = {
        left: { x: 145, y: 300 },
        topLeft: { x: 225, y: 125 },
        top: { x: 430, y: 55 },
        topRight: { x: 635, y: 125 },
        right: { x: 715, y: 300 },
        bottomRight: { x: 635, y: 475 },
        bottom: { x: 430, y: 545 },
        bottomLeft: { x: 225, y: 475 }
      };

      polygon([p.left, p.topLeft, p.top, p.topRight, p.right, p.bottomRight, p.bottom, p.bottomLeft], "line");

      polygon([p.top, p.right, p.bottom, p.left], "thin-line");
      polygon([p.topLeft, p.topRight, p.bottomRight, p.bottomLeft], "thin-line");

      line(p.left.x, p.left.y, p.right.x, p.right.y, "thin-line");
      line(p.top.x, p.top.y, p.bottom.x, p.bottom.y, "thin-line");

      line(p.topLeft.x, p.topLeft.y, p.bottomRight.x, p.bottomRight.y, "male-line");
      line(p.topRight.x, p.topRight.y, p.bottomLeft.x, p.bottomLeft.y, "female-line");

      line(p.topLeft.x, p.topLeft.y, p.bottomLeft.x, p.bottomLeft.y, "thin-line");
      line(p.topRight.x, p.topRight.y, p.bottomRight.x, p.bottomRight.y, "thin-line");

      line(290, 300, 570, 300, "thin-line");
      line(430, 160, 430, 440, "thin-line");

      line(500, 370, 615, 255, "dashed-line");

      text(320, 245, "male generation line", "label");
      text(485, 245, "female generation line", "label");

      const sides = [
        [p.left, p.topLeft, 0],
        [p.topLeft, p.top, 10],
        [p.top, p.topRight, 20],
        [p.topRight, p.right, 30],
        [p.right, p.bottomRight, 40],
        [p.bottomRight, p.bottom, 50],
        [p.bottom, p.bottomLeft, 60],
        [p.bottomLeft, p.left, 70]
      ];

      const years = yearlyValues(m);
      let yearIndex = 0;

      sides.forEach(([a, b, ageStart]) => {
        const pts = sidePoints(a, b, 5);

        pts.forEach((base, i) => {
          const outside = moveFromCenter(base, cx, cy, 36);
          const inside = moveToCenter(base, cx, cy, 20);

          text(outside.x, outside.y, years[yearIndex] || "", "tiny");

          if (i === 0) {
            text(inside.x, inside.y - 2, `${ageStart}`, "age-main");
            text(inside.x, inside.y + 7, "years old", "age-small");
          } else {
            text(inside.x, inside.y, ageStart + i * 2, "age-small");
          }

          yearIndex++;
        });
      });

      circle(p.left.x, p.left.y, m.D, colors.violet, 37, "big-num");
      circle(p.top.x, p.top.y, m.M, colors.violet, 37, "big-num");
      circle(p.right.x, p.right.y, m.Y, colors.red, 37, "big-num");
      circle(p.bottom.x, p.bottom.y, m.tail, colors.red, 37, "big-num");

      circle(p.topLeft.x, p.topLeft.y, m.A1, colors.white, 35, "big-num");
      circle(p.topRight.x, p.topRight.y, m.B1, colors.white, 35, "big-num");
      circle(p.bottomRight.x, p.bottomRight.y, m.C1, colors.white, 35, "big-num");
      circle(p.bottomLeft.x, p.bottomLeft.y, m.D1, colors.white, 35, "big-num");

      circle(cx, cy, m.center, colors.yellow, 37, "big-num");

      circle(430, 150, m.talent2, colors.blue, 19, "small-num");
      circle(430, 190, m.talent3, colors.lightBlue, 19, "small-num");
      circle(430, 230, m.personalPurpose, colors.green, 18, "small-num");

      circle(325, 300, m.portrait2, colors.blue, 21, "small-num");
      circle(365, 300, m.portrait3, colors.lightBlue, 19, "small-num");
      circle(400, 300, m.earth, colors.green, 18, "small-num");

      circle(505, 300, m.material2, colors.white, 20, "small-num");
      circle(545, 300, m.material3, colors.orange, 22, "small-num");

      circle(430, 350, m.karmic2, colors.white, 20, "small-num");
      circle(430, 405, m.karmic3, colors.orange, 22, "small-num");

      borderCircle(290, 195, m.male1, 20);
      borderCircle(345, 245, m.male2, 20);

      borderCircle(565, 195, m.female1, 20);
      borderCircle(515, 245, m.female2, 20);

      borderCircle(290, 405, m.D1, 20);
      borderCircle(345, 355, m.love, 20);

      borderCircle(570, 405, m.C1, 20);
      borderCircle(515, 355, m.finance, 20);

      borderCircle(515, 420, m.relationship, 20);
      borderCircle(565, 365, m.money, 20);

      text(485, 390, "♥", "heart");
      text(585, 370, "$", "money");
    }

    function renderHealth(m) {
      const rows = [
        ["1", "Sahasrara", "Mission", m.sky, m.M],
        ["2", "Ajna", "Destiny, egregores", m.portrait3, m.talent2],
        ["3", "Vissudha", "Destiny, egregores", m.talent2, m.talent3],
        ["4", "Anahata", "Relationships, picture of the world", m.material2, m.personalPurpose],
        ["5", "Manipura", "Status, possessions", m.center, m.center],
        ["6", "Svadhisthana", "Love of children, Joy", m.love, m.karmic2],
        ["7", "Muladhara", "Body, materia", m.tail, m.karmic3]
      ];

      const chakraClasses = ["violet", "indigo", "blue", "green", "yellow", "orange", "red"];

      const body = rows.map((r, i) => {
        const emotion = add22(r[3], r[4]);
        return `
          <tr>
            <td class="chakra-color ${chakraClasses[i]}">${r[0]}</td>
            <td><b>${r[1]}</b><br><span>${r[2]}</span></td>
            <td>${r[3]}</td>
            <td>${r[4]}</td>
            <td>${emotion}</td>
          </tr>
        `;
      }).join("");

      const resultPhysics = add22(...rows.map(r => r[3]));
      const resultEnergy = add22(...rows.map(r => r[4]));
      const resultEmotion = add22(resultPhysics, resultEnergy);

      healthCard.innerHTML = `
        <table class="health-table">
          <thead>
            <tr>
              <th></th>
              <th>Chakra name</th>
              <th>Physics</th>
              <th>Energy</th>
              <th>Emotions</th>
            </tr>
          </thead>
          <tbody>
            ${body}
            <tr>
              <td></td>
              <td><b>Result</b><br><span>Common energy-zone</span></td>
              <td>${resultPhysics}</td>
              <td>${resultEnergy}</td>
              <td>${resultEmotion}</td>
            </tr>
          </tbody>
        </table>
      `;
    }

    function mini(values) {
      return values.map(v => `<span class="mini-circle">${v}</span>`).join("");
    }

    function renderBlocks(m) {
      maleLines.innerHTML = mini([m.male1, m.male2, m.male3]);
      femaleLines.innerHTML = mini([m.female1, m.female2, m.female3]);

      programs.innerHTML = `
        <p><b>Relationship Program:</b></p>
        <div class="small-circles">${mini([m.love, m.relationship, m.center])}</div>

        <p><b>Money Program:</b></p>
        <div class="small-circles">${mini([m.material2, m.finance, m.money])}</div>

        <p><b>Karmic Tail:</b></p>
        <div class="small-circles">${mini([m.tail, m.karmic2, m.karmic3])}</div>

        <p><b>Talents:</b></p>
        <div class="small-circles">${mini([m.M, m.talent2, m.talent3])}</div>
      `;

      purposes.innerHTML = `
        <p><b>Personal purpose:</b></p>
        <div class="small-circles">${mini([m.sky, m.earth, m.personalPurpose])}</div>

        <p><b>Social purpose:</b></p>
        <div class="small-circles">${mini([m.socialM, m.socialF, m.socialPurpose])}</div>

        <p><b>Spiritual purpose:</b></p>
        <div class="small-circles">${mini([m.spiritualPurpose])}</div>
      `;
    }

    function calculateAndRender() {
      const dateValue = document.getElementById("birthDate").value;
      if (!dateValue) return;

      const m = calculateMatrix(dateValue);

      result.style.display = "block";
      drawMatrix(m);
      renderHealth(m);
      renderBlocks(m);
    }

    document.getElementById("calculateBtn").addEventListener("click", calculateAndRender);
    document.getElementById("birthDate").addEventListener("change", calculateAndRender);
  </script>
</body>
</html>
